<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>核銷 Let's go! — 政府支出法規知識庫</title>
<style>
/* ──────────────────────────────────────────────────────
   核銷 Let's go! — V3 vanilla port
   ────────────────────────────────────────────────────── */
:root {
  --c-bg: oklch(98.5% 0.008 80);
  --c-paper: oklch(99.5% 0.004 80);
  --c-ink: oklch(22% 0.02 60);
  --c-ink2: oklch(46% 0.018 60);
  --c-ink3: oklch(64% 0.014 60);
  --c-rule: oklch(90% 0.012 80);
  --c-mint: oklch(93% 0.045 165);
  --c-peach: oklch(93% 0.045 45);
  --c-lavender: oklch(93% 0.045 295);
  --c-butter: oklch(94% 0.05 95);
  --c-rose: oklch(93% 0.045 15);
  --c-sky: oklch(93% 0.04 235);
  --c-accent: oklch(58% 0.13 25);

  --f-sans: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", "Noto Sans CJK TC", "Helvetica Neue", Helvetica, system-ui, sans-serif;
  --f-serif: "Source Han Serif TC", "Noto Serif TC", "Noto Serif CJK TC", "PingFang TC", Georgia, "Times New Roman", serif;
  --f-mono: "SF Mono", "JetBrains Mono", "Cascadia Mono", "IBM Plex Mono", Consolas, "Courier New", ui-monospace, monospace;

  --maxw: 1440px;
  --pad-x: 56px;
  --space-section: 96px;
  --r: 22px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--c-bg); color: var(--c-ink);
  font-family: var(--f-sans);
  font-size: 15px; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font: inherit; color: inherit; background: transparent; border: 0; cursor: pointer; padding: 0; }
input { font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }
.mono { font-family: var(--f-mono); font-feature-settings: "tnum"; letter-spacing: 0; }
.dim { color: var(--c-ink3); }
.small { font-size: 12.5px; }
.num { font-variant-numeric: tabular-nums; }
em { font-style: italic; font-weight: 400; }
.serif-on .hero-title em,
.serif-on .view-title em { font-family: var(--f-serif); font-style: italic; font-weight: 500; }
.serif-on .hero-title,
.serif-on .view-title { font-family: var(--f-serif); font-weight: 500; }

::selection { background: var(--c-butter); color: var(--c-ink); }

.density-comfortable { line-height: 1.7; }
.density-compact .node-card,
.density-compact .scen-card { padding: 18px 20px; }

/* ───── Topbar ───── */
.topbar {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 36px;
  padding: 22px var(--pad-x);
  position: sticky; top: 0; z-index: 30;
  background: color-mix(in oklch, var(--c-bg) 88%, transparent);
  backdrop-filter: blur(14px);
}
.brand { display: inline-flex; align-items: baseline; gap: 8px; }
.brand-mark { font-family: var(--f-serif); font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
.brand-sub { font-family: var(--f-mono); font-size: 11.5px; color: var(--c-ink3); letter-spacing: 0.02em; }
.tabs { display: flex; gap: 28px; justify-self: start; align-self: center; }
.tab { font-size: 14px; color: var(--c-ink2); padding: 4px 0; position: relative; transition: color .15s; }
.tab:hover { color: var(--c-ink); }
.tab.active { color: var(--c-ink); }
.tab.active::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -8px;
  height: 1px; background: var(--c-ink);
}
.cmdk-btn {
  display: inline-flex; align-items: center; gap: 14px;
  padding: 8px 14px 8px 18px; border-radius: 99px;
  background: var(--c-paper); color: var(--c-ink3);
  font-size: 13px;
}
.cmdk-btn:hover { color: var(--c-ink); }
.cmdk-btn kbd {
  font-family: var(--f-mono); font-size: 11px;
  padding: 2px 7px; border-radius: 6px; background: var(--c-bg); color: var(--c-ink2);
}

/* ───── Layout ───── */
.main { padding: 0 var(--pad-x); max-width: var(--maxw); margin: 0 auto; }
.view { padding-top: 24px; padding-bottom: var(--space-section); }
.empty { padding: 80px 0; color: var(--c-ink3); text-align: center; font-family: var(--f-mono); font-size: 13px; }

/* ───── Footer ───── */
.footer {
  margin-top: var(--space-section);
  padding: 48px var(--pad-x) 80px;
  max-width: var(--maxw); margin-left: auto; margin-right: auto;
}
.footer-row { display: flex; gap: 12px; align-items: center; font-size: 13px; color: var(--c-ink2); flex-wrap: wrap; }
.footer-row.dim { color: var(--c-ink3); margin-top: 6px; }
.footer-row .dot { color: var(--c-ink3); }

/* ───── Landing ───── */
.landing { padding: 32px 0 40px; }
.hero {
  padding: 80px 0 96px;
  border-bottom: 1px solid var(--c-rule);
  margin-bottom: 64px;
}
.hero-meta {
  display: flex; gap: 40px;
  font-family: var(--f-mono); font-size: 11.5px;
  color: var(--c-ink3); letter-spacing: 0.04em; text-transform: uppercase;
  margin-bottom: 56px;
}
.hero-title {
  font-size: clamp(56px, 7.5vw, 110px);
  line-height: 0.96; letter-spacing: -0.03em;
  margin: 0 0 32px;
  max-width: 14ch;
  text-wrap: balance;
}
.hero-lede {
  max-width: 56ch; font-size: 18px; line-height: 1.6;
  color: var(--c-ink2); margin: 0 0 40px;
}
.hero-cta { display: flex; gap: 32px; align-items: baseline; flex-wrap: wrap; }
.link-cta {
  font-size: 17px; color: var(--c-ink); padding: 6px 0;
  border-bottom: 1px solid var(--c-ink); transition: gap .15s;
}
.link-cta:hover { color: var(--c-accent); border-color: var(--c-accent); }
.link-cta.sub { color: var(--c-ink2); border-color: var(--c-ink3); font-size: 14px; }
.link-cta.small { font-size: 12.5px; padding: 0; }

.big-stats {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 32px;
  padding: 40px 0 80px;
  border-bottom: 1px solid var(--c-rule);
  margin-bottom: 80px;
}
.stat {}
.stat-num {
  font-family: var(--f-serif);
  font-size: 64px; line-height: 1; font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--c-ink);
}
.stat-num.mono { font-family: var(--f-mono); font-size: 36px; font-weight: 400; }
.stat-num.small { font-size: 28px; }
.stat-label { margin-top: 14px; font-family: var(--f-mono); font-size: 11.5px; color: var(--c-ink3); letter-spacing: 0.04em; text-transform: uppercase; }

.entries {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 96px;
}
.entry {
  text-align: left;
  padding: 36px 36px 32px;
  border-radius: var(--r);
  display: flex; flex-direction: column; gap: 10px;
  transition: transform .25s ease;
  min-height: 380px;
}
.entry:hover { transform: translateY(-4px); }
.entry.tone-mint     { background: var(--c-mint); }
.entry.tone-peach    { background: var(--c-peach); }
.entry.tone-lavender { background: var(--c-lavender); }
.entry-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 28px; }
.entry-num { font-family: var(--f-serif); font-size: 44px; font-weight: 500; letter-spacing: -0.02em; }
.entry-kicker { font-family: var(--f-mono); font-size: 11px; color: var(--c-ink2); letter-spacing: 0.05em; text-transform: uppercase; }
.entry-title { font-family: var(--f-serif); font-size: 38px; font-weight: 500; letter-spacing: -0.02em; margin: 0; line-height: 1.05; }
.entry-sub { font-size: 16px; color: var(--c-ink2); font-style: italic; margin-top: 4px; }
.entry-desc { font-size: 14px; color: var(--c-ink2); line-height: 1.65; margin: 12px 0 0; max-width: 32ch; }
.entry-notes { list-style: none; padding: 0; margin: auto 0 0; display: flex; flex-direction: column; gap: 4px; }
.entry-notes li {
  font-family: var(--f-mono); font-size: 11.5px; color: var(--c-ink2);
  padding: 4px 0; border-top: 1px dashed color-mix(in oklch, var(--c-ink) 18%, transparent);
}
.entry-notes li:first-child { border-top: 1px solid color-mix(in oklch, var(--c-ink) 30%, transparent); }
.entry-cta { margin-top: 20px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
.entry-cta span { font-size: 18px; }

/* category strip */
.cat-strip { padding: 32px 0 80px; border-top: 1px solid var(--c-rule); }
.cat-strip-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; }
.cat-strip-head h3 { font-family: var(--f-serif); font-size: 28px; font-weight: 500; margin: 0; letter-spacing: -0.01em; }
.cat-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.cat-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 18px 22px; border-radius: 14px;
  font-size: 16px; transition: transform .15s;
}
.cat-row:hover { transform: translateY(-2px); }
.cat-name { color: var(--c-ink); }
.cat-count { font-family: var(--f-mono); font-size: 13px; color: var(--c-ink2); }
.cat-row.tone-mint     { background: var(--c-mint); }
.cat-row.tone-peach    { background: var(--c-peach); }
.cat-row.tone-lavender { background: var(--c-lavender); }
.cat-row.tone-butter   { background: var(--c-butter); }
.cat-row.tone-rose     { background: var(--c-rose); }
.cat-row.tone-sky      { background: var(--c-sky); }

/* editorial note */
.editorial-note { padding: 56px 0 0; border-top: 1px solid var(--c-rule); display: grid; grid-template-columns: 200px 1fr; gap: 32px; }
.editorial-note .kicker { font-family: var(--f-mono); font-size: 12px; color: var(--c-ink3); letter-spacing: 0.04em; text-transform: uppercase; }
.editorial-note p { margin: 0; max-width: 60ch; line-height: 1.75; color: var(--c-ink2); font-size: 15.5px; }
.editorial-note u { text-decoration: underline; text-decoration-color: color-mix(in oklch, var(--c-ink) 30%, transparent); text-underline-offset: 3px; color: var(--c-ink); }
.pill {
  display: inline-block;
  padding: 1px 8px; border-radius: 99px;
  font-family: var(--f-mono); font-size: 11px;
}
.pill-amber { background: var(--c-butter); color: oklch(38% 0.1 80); }
.pill-rose  { background: var(--c-rose);   color: oklch(42% 0.1 25); }
.pill-gray  { background: oklch(92% 0.005 80); color: var(--c-ink3); }
.pill-mint  { background: var(--c-mint);   color: oklch(38% 0.08 165); }

/* ───── View head ───── */
.view-head { padding: 56px 0 64px; max-width: 800px; }
.view-meta { display: flex; gap: 24px; font-size: 12px; color: var(--c-ink3); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 32px; }
.view-title { font-size: clamp(48px, 6vw, 84px); line-height: 1; letter-spacing: -0.025em; margin: 0 0 24px; max-width: 12ch; text-wrap: balance; }
.view-lede { font-size: 17px; color: var(--c-ink2); max-width: 60ch; margin: 0; line-height: 1.6; }

/* ───── Search bar ───── */
.search-bar {
  display: flex; align-items: center; gap: 24px;
  padding: 14px 0; margin-bottom: 32px;
  border-bottom: 1px solid var(--c-rule);
}
.search-input {
  flex: 1; background: transparent; border: 0; outline: none;
  font-size: 18px; padding: 8px 0; color: var(--c-ink);
}
.search-input::placeholder { color: var(--c-ink3); }
.search-input.small { font-size: 14px; padding: 6px 0; border-bottom: 1px solid var(--c-rule); margin-bottom: 12px; width: 100%; }
.search-meta { font-size: 12px; color: var(--c-ink3); }

/* ───── Scenarios ───── */
.scen-group { padding: 40px 32px; border-radius: var(--r); margin-bottom: 16px; }
.scen-group.bg-mint     { background: var(--c-mint); }
.scen-group.bg-peach    { background: var(--c-peach); }
.scen-group.bg-lavender { background: var(--c-lavender); }
.scen-group.bg-butter   { background: var(--c-butter); }
.scen-group.bg-rose     { background: var(--c-rose); }
.scen-group.bg-sky      { background: var(--c-sky); }
.scen-group-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 28px; }
.scen-group-head h3 { font-family: var(--f-serif); font-size: 30px; font-weight: 500; letter-spacing: -0.01em; margin: 0; }
.scen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.scen-card {
  text-align: left;
  background: color-mix(in oklch, var(--c-paper) 88%, transparent);
  padding: 22px 24px; border-radius: 16px;
  display: flex; flex-direction: column; gap: 8px;
  min-height: 168px; transition: background .15s;
  position: relative;
}
.scen-card:hover { background: var(--c-paper); }
.scen-card.has-flow { border-left: 3px solid var(--c-accent); padding-left: 21px; }
.scen-card.has-flow:hover { background: color-mix(in oklch, var(--c-paper) 96%, var(--c-accent) 4%); }
.scen-meta { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--c-ink3); letter-spacing: 0.03em; text-transform: uppercase; }
.scen-flowtag {
  color: var(--c-accent); font-weight: 500;
  padding: 2px 8px 2px 4px; border-radius: 99px;
  background: color-mix(in oklch, var(--c-accent) 8%, transparent);
}
.scen-flowtag::before { content: "› "; opacity: .7; }
.scen-title { font-size: 19px; font-weight: 500; line-height: 1.3; color: var(--c-ink); }
.scen-sub { font-size: 13.5px; color: var(--c-ink2); line-height: 1.55; }
.scen-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.tag { font-family: var(--f-mono); font-size: 11px; padding: 2px 8px; border-radius: 99px; background: color-mix(in oklch, var(--c-ink) 5%, transparent); color: var(--c-ink2); }
.tag.muted { color: var(--c-ink3); }
.scen-foot { display: flex; justify-content: space-between; margin-top: auto; font-size: 11.5px; color: var(--c-ink3); padding-top: 12px; border-top: 1px dashed color-mix(in oklch, var(--c-ink) 12%, transparent); }

/* ───── Corpus ───── */
.filters { padding: 0 0 32px; margin-bottom: 24px; border-bottom: 1px solid var(--c-rule); }
.filter-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 10px 0; }
.filter-label { font-size: 11px; color: var(--c-ink3); letter-spacing: 0.04em; text-transform: uppercase; min-width: 84px; }
.chip {
  font-size: 13px; padding: 6px 14px;
  border-radius: 99px; background: transparent; color: var(--c-ink2);
  transition: all .15s;
}
.chip:hover { color: var(--c-ink); background: var(--c-paper); }
.chip.on { background: var(--c-ink); color: var(--c-paper); }
.filter-row.search { padding-top: 18px; }

.corpus-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; }
.node-card {
  text-align: left;
  padding: 22px 24px;
  border-radius: 16px;
  display: flex; flex-direction: column; gap: 10px;
  transition: transform .18s;
  min-height: 220px;
}
.node-card:hover { transform: translateY(-3px); }
.node-card.bg-mint     { background: var(--c-mint); }
.node-card.bg-peach    { background: var(--c-peach); }
.node-card.bg-lavender { background: var(--c-lavender); }
.node-card.bg-butter   { background: var(--c-butter); }
.node-card.bg-rose     { background: var(--c-rose); }
.node-card.bg-sky      { background: var(--c-sky); }
.node-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--c-ink3); letter-spacing: 0.04em; }
.node-title { font-size: 18px; font-weight: 500; line-height: 1.3; color: var(--c-ink); }
.node-summary { font-size: 13.5px; color: var(--c-ink2); line-height: 1.6; flex: 1; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
.node-foot { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; gap: 8px; }
.node-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.node-flags { display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-end; }

/* ───── Drawer ───── */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: color-mix(in oklch, var(--c-ink) 38%, transparent);
  backdrop-filter: blur(6px);
  display: flex; justify-content: flex-end;
  animation: fadein .2s ease;
}
@keyframes fadein { from { opacity: 0; } }
.drawer {
  width: min(640px, 100vw);
  height: 100vh; overflow-y: auto;
  padding: 32px 40px 80px;
  animation: slidein .25s cubic-bezier(.2,.8,.2,1);
}
.drawer.bg-mint     { background: var(--c-mint); }
.drawer.bg-peach    { background: var(--c-peach); }
.drawer.bg-lavender { background: var(--c-lavender); }
.drawer.bg-butter   { background: var(--c-butter); }
.drawer.bg-rose     { background: var(--c-rose); }
.drawer.bg-sky      { background: var(--c-sky); }
@keyframes slidein { from { transform: translateX(20px); opacity: 0; } }
.drawer-top, .modal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 12px; }
.drawer-meta, .modal-meta { display: flex; gap: 14px; font-size: 11.5px; color: var(--c-ink2); letter-spacing: 0.04em; text-transform: uppercase; align-items: center; flex-wrap: wrap; }
.drawer-nav { display: inline-flex; align-items: center; gap: 4px; font-family: var(--f-mono); font-size: 11.5px; color: var(--c-ink2); padding: 4px 8px; border-radius: 99px; background: color-mix(in oklch, var(--c-ink) 5%, transparent); }
.drawer-nav button { padding: 0 4px; line-height: 1; color: var(--c-ink2); transition: color .15s; }
.drawer-nav button:hover:not(:disabled) { color: var(--c-ink); }
.drawer-nav button:disabled { opacity: .35; cursor: default; }
.drawer-nav .nav-counter { padding: 0 4px; }
.modal-close { font-family: var(--f-mono); font-size: 12px; color: var(--c-ink2); }
.modal-close:hover { color: var(--c-ink); }
.drawer-title { font-family: var(--f-serif); font-size: 38px; font-weight: 500; line-height: 1.1; letter-spacing: -0.02em; margin: 16px 0 18px; }
.drawer-summary { font-size: 16px; line-height: 1.7; color: var(--c-ink); margin-bottom: 28px; }
.kv { display: grid; gap: 8px; padding: 18px 0; border-top: 1px solid color-mix(in oklch, var(--c-ink) 12%, transparent); border-bottom: 1px solid color-mix(in oklch, var(--c-ink) 12%, transparent); }
.kv-row { display: grid; grid-template-columns: 100px 1fr; align-items: baseline; font-size: 13.5px; }
.kv-k { font-size: 11px; color: var(--c-ink3); letter-spacing: 0.04em; text-transform: uppercase; }

.drawer-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 28px 0; }
.related { padding-top: 20px; }
.related-list { display: flex; flex-direction: column; gap: 2px; }
.related-item {
  display: grid; grid-template-columns: 160px 1fr; gap: 16px;
  padding: 12px 0; text-align: left;
  border-top: 1px dashed color-mix(in oklch, var(--c-ink) 14%, transparent);
  font-size: 14px; color: var(--c-ink);
  transition: padding .15s;
}
.related-item:hover { padding-left: 6px; }
.related-item span:first-child { font-size: 11.5px; color: var(--c-ink3); }

.banner {
  padding: 14px 18px; border-radius: 14px;
  font-size: 13.5px; line-height: 1.55; margin-bottom: 16px;
  background: var(--c-paper); color: var(--c-ink);
}
.banner strong { font-family: var(--f-mono); font-weight: 500; margin-right: 8px; }
.banner-amber strong { color: oklch(46% 0.13 70); }
.banner-rose  strong { color: oklch(46% 0.14 22); }
.banner-gray  strong { color: var(--c-ink2); }

.section { padding: 22px 0; border-top: 1px solid color-mix(in oklch, var(--c-ink) 10%, transparent); }
.section-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
.section-kicker { font-size: 11px; color: var(--c-ink3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }
.section-body { font-size: 14px; line-height: 1.7; color: var(--c-ink2); margin: 0; }

.ratetable-wrap { overflow-x: auto; margin-top: 8px; }
.ratetable { width: 100%; border-collapse: collapse; font-size: 13px; }
.ratetable th, .ratetable td { padding: 8px 10px; text-align: left; }
.ratetable th { font-family: var(--f-mono); font-size: 11px; color: var(--c-ink3); letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 1px solid color-mix(in oklch, var(--c-ink) 16%, transparent); }
.ratetable td { border-bottom: 1px dashed color-mix(in oklch, var(--c-ink) 8%, transparent); }
.ratetable .num { text-align: right; }
.ratetable .sec-row td { padding-top: 14px; padding-bottom: 4px; font-size: 11px; color: var(--c-ink3); letter-spacing: 0.05em; text-transform: uppercase; border: 0; }

/* ───── Scenario modal ───── */
.modal {
  width: min(900px, 96vw); max-height: 92vh; overflow-y: auto;
  margin: auto; padding: 32px 40px 40px; border-radius: var(--r);
  align-self: center; justify-self: center;

<body>
<div id="root"></div>

<script>
// ─────────────────────────────────────────────────────────────────
// DATA — inlined from design-preview/data.js
// ─────────────────────────────────────────────────────────────────
window.KB_META = { last_indexed: "—", node_count: 0, scenario_count: 0, status_counts: {}, review_level_counts: {}, category_counts: {} };
window.KB_PARENTS = [];
window.KB_NODES = [];
window.KB_SCENARIOS = [];
// 真實資料於 bootstrap 時 fetch(03_index/nodes.json + 04_web/data/scenarios_*.json)

// ─────────────────────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────────────────────
let NODE_BY_ID = {};

// 從 03_index 與 04_web/data 讀取真實資料(同 live 來源)。
// nodes.json:520 條;scenarios_manual.json:74;scenarios_auto.json:43
async function loadData() {
  const base = "../"; // 04_web/index-v3.html → 03_index/ 在 ../03_index/
  const [nodes, sm, sa, meta] = await Promise.all([
    fetch(base + "03_index/nodes.json").then(r => r.json()),
    fetch("data/scenarios_manual.json").then(r => r.json()),
    fetch("data/scenarios_auto.json").then(r => r.json()),
    fetch(base + "03_index/_meta.json").then(r => r.ok ? r.json() : null).catch(() => null),
  ]);
  // 合併 manual + auto;auto 沒 subtitle,用 question fallback
  const scenarios = [
    ...(sm.scenarios || []),
    ...((sa.scenarios || []).map(s => ({ ...s, subtitle: s.subtitle || s.question || "", source: s.source || "auto" }))),
  ];
  // 從節點推出母題清單(只取有資料者)
  const parentSet = new Map();
  for (const n of nodes) parentSet.set(n.parent, (parentSet.get(n.parent) || 0) + 1);
  const parents = [...parentSet.keys()];
  // 統計
  const statusCounts = {};
  const reviewCounts = {};
  for (const n of nodes) {
    statusCounts[n.status || "現行"] = (statusCounts[n.status || "現行"] || 0) + 1;
    reviewCounts[n.review_level || "—"] = (reviewCounts[n.review_level || "—"] || 0) + 1;
  }
  window.KB_NODES = nodes;
  window.KB_SCENARIOS = scenarios;
  window.KB_PARENTS = parents;
  window.KB_META = {
    last_indexed: (meta && meta.last_indexed) || "—",
    node_count: nodes.length,
    scenario_count: scenarios.length,
    status_counts: statusCounts,
    review_level_counts: reviewCounts,
    category_counts: Object.fromEntries(parentSet),
  };
  NODE_BY_ID = Object.fromEntries(nodes.map(n => [n.id, n]));
}

function categoryTone(parent) {
  switch (parent) {
    case "國內旅費":      return "mint";
    case "國外旅費":      return "peach";
    case "出席費鐘點費":  return "lavender";
    case "禮品交際費":    return "butter";
    case "支出憑證與結報": return "sky";
    default:              return "rose";
  }
}

function nodeTypeLabel(t) {
  return ({"核心法規": "A 法規", "支出標準": "B 標準", "解釋函令": "C 函令", "問答集": "D 問答"}[t]) || t;
}

// HTML escaping for safe template-literal injection
function esc(v) {
  if (v == null) return "";
  return String(v)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}
function escAttr(v) { return esc(v); }

// 月支生活費級距 — parsed from A-國外旅費-024
function parseMonthlyTier(row) {
  const range = (row[0] || "").replace(/\s/g, "");
  const monthly = parseInt((row[1] || "").replace(/,/g, ""), 10);
  let min, max;
  const m1 = range.match(/^(\d+)以上/);
  const m2 = range.match(/^(\d+)以下/);
  const m3 = range.match(/^(\d+)[–\-~](\d+)/);
  if (m1) { min = +m1[1]; max = Infinity; }
  else if (m2) { min = 0; max = +m2[1]; }
  else if (m3) { min = +m3[1]; max = +m3[2]; }
  return { range: row[0], min, max, monthly };
}

// ─────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────
const state = {
  view: "landing",            // landing | scenarios | corpus | calc
  filterParent: null,
  drawerNode: null,

  scenarioOpen: null,

  cmdkOpen: false,
  cmdkQuery: "",
  cmdkHi: 0,
  // corpus filter state
  corpusQ: "",

  // scenarios search

  rateTableQ: "",

function setState(patch) { Object.assign(state, patch); render(); }

// ─────────────────────────────────────────────────────────────────

// ── Landing ──
function renderLanding() {
  const meta = window.KB_META;
  const cats = Object.entries(meta.category_counts);
  return `

        <div class="stat"><div class="stat-num mono small">${esc(meta.last_indexed)}</div><div class="stat-label">最後更新</div></div>

          <div class="entry-top"><span class="entry-num">01</span><span class="entry-kicker">使用者語言</span></div>

          <p class="entry-desc">117 張核銷情境卡。從「當日往返」「跨夜住宿」「未列載城市」直接找到該援引的條文。</p>

// ── Scenarios ──
function scenariosFiltered() {
  const q = state.scenQ;
  return (window.KB_SCENARIOS || []).filter(s => {
    if (!q) return true;
    return s.title.includes(q) || s.subtitle.includes(q) || (s.tags||[]).some(t => t.includes(q));
  });
}

function renderScenarios() {
  const filtered = scenariosFiltered();
  const total = filtered.length;
  const grandTotal = (window.KB_SCENARIOS || []).length;

  // group by parent, preserving first-seen order
  const map = new Map();
  for (const s of filtered) {
    if (!map.has(s.parent)) map.set(s.parent, []);
    map.get(s.parent).push(s);
  }
  const groups = [...map.entries()];

  const groupsHtml = groups.length === 0
    ? `<div class="empty">沒有符合的情境 — 試試其他關鍵字。</div>`
    : groups.map(([parent, items]) => `
        <div class="scen-group bg-${categoryTone(parent)}">
          <div class="scen-group-head">
            <h3>${esc(parent)}</h3>
            <span class="dim mono">${items.length} scenarios</span>
          </div>
          <div class="scen-grid">
            ${items.map(s => `
              <button class="scen-card ${s.flow ? "has-flow" : ""}" data-act="open-scenario" data-id="${escAttr(s.id)}">
                <div class="scen-meta mono">
                  <span>${esc(s.expense || "")}</span>
                  ${s.flow ? `<span class="scen-flowtag">逐步問答</span>` : ""}
                </div>
                <div class="scen-title">${esc(s.title)}</div>
                <div class="scen-sub">${esc(s.subtitle)}</div>
                <div class="scen-tags">
                  ${(s.tags || []).slice(0, 4).map(t => `<span class="tag">${esc(t)}</span>`).join("")}
                </div>
                <div class="scen-foot mono">
                  <span>援引 ${(s.primary_ids || []).length} 筆條文</span>
                  <span>&rarr;</span>
                </div>
              </button>
            `).join("")}
          </div>
        </div>
      `).join("");

  return `
    <section class="view scenarios">
      ${renderViewHead({
        num: "01", kicker: "情境檢索 · Scenarios",
        titleHtml: `用你的話<em>搜起來。</em>`,
        lede: "從具體情境出發,系統會把對應的法規條文、附表、解釋函令與單據需求一起呈現。"
      })}
      <div class="search-bar">
        <input class="search-input" id="scen-search" placeholder="搜尋情境⋯⋯ 例:跨夜、東京、商務艙、簽案影本" value="${escAttr(state.scenQ)}" />
        <span class="search-meta mono">${total} / ${grandTotal}</span>
      </div>
      ${groupsHtml}
    </section>
  `;
}

// ── Corpus ──
function corpusFiltered() {
  const all = window.KB_NODES || [];
  return all.filter(n => {
    if (state.filterParent && n.parent !== state.filterParent) return false;
    if (state.corpusType !== "all" && n.type !== state.corpusType) return false;
    if (state.corpusStatus !== "all" && n.status !== state.corpusStatus) return false;
    if (state.corpusCertainty === "normal" && n.certainty) return false;
    if (state.corpusCertainty === "inferred" && n.certainty !== "inferred") return false;
    if (state.corpusCertainty === "contested" && n.certainty !== "contested") return false;
    if (state.corpusQ) {
      const blob = (n.id + n.title + n.summary + (n.tags || []).join("")).toLowerCase();
      if (!blob.includes(state.corpusQ.toLowerCase())) return false;
    }
    return true;
  });
}

function renderNodeCard(n) {
  const tone = categoryTone(n.parent);
  const tagsHtml = (n.tags || []).slice(0, 3).map(t => `<span class="tag">${esc(t)}</span>`).join("")

    n.certainty === "inferred"  ? `<span class="pill pill-amber">推論</span>` : "",
    n.certainty === "contested" ? `<span class="pill pill-rose">爭議</span>` : "",

    n.rate_table                 ? `<span class="pill pill-mint">含費率表</span>` : "",

  return `

}

// daily calc: city search + days + pct + monthly per-diem block
function renderCalcDaily() {
  const node = NODE_BY_ID["B-國外旅費-003"];
  const mainland = NODE_BY_ID["B-國外旅費-002"];
  const studyAbroad = NODE_BY_ID["A-國外旅費-024"];
  const all = [];
  // 真實 rate_table sections rows = [編號, 國家, 城市, 數額] — 4 欄;若只 3 欄則 fallback 到 [國家, 城市, 數額]
  if (node && node.rate_table && node.rate_table.sections) {
    for (const sec of node.rate_table.sections) {
      for (const r of (sec.rows || [])) {
        const has4 = r.length >= 4;
        all.push({
          region: sec.title || "",
          country: String(has4 ? r[1] : r[0] || ""),
          city:    String(has4 ? r[2] : r[1] || ""),
          amount:  parseInt(String(has4 ? r[3] : r[2]).replace(/,/g, ""), 10),
          sourceId: "B-國外旅費-003",
        });
      }
    }
  }
  // B-國外旅費-002 大陸港澳 (flat rows = [編號, 城市, 數額] 或 [城市, 數額])
  if (mainland && mainland.rate_table && Array.isArray(mainland.rate_table.rows)) {
    for (const r of mainland.rate_table.rows) {
      const has3 = r.length >= 3;
      all.push({
        region:  "大陸港澳",
        country: "大陸港澳",
        city:    String(has3 ? r[1] : r[0] || ""),
        amount:  parseInt(String(has3 ? r[2] : r[1]).replace(/,/g, ""), 10),
        sourceId: "B-國外旅費-002",
      });
    }
  }
  const monthlyTiers = (() => {
    const rows = (studyAbroad && studyAbroad.rate_table && studyAbroad.rate_table.sections && studyAbroad.rate_table.sections[0]) ? studyAbroad.rate_table.sections[0].rows : [];
    return rows.map(parseMonthlyTier).filter(t => Number.isFinite(t.min));
  })();
  const findMonthly = (daily) => monthlyTiers.find(t => daily >= t.min && daily <= t.max);

  const q = state.calcDailyQ;
  const days = state.calcDailyDays;
  const pct = state.calcDailyPct;
  const ql = q.toLowerCase();
  const hits = all.filter(r => !q || (r.city + r.country + r.region).toLowerCase().includes(ql)).slice(0, 8);
  const sel = hits[0];
  const tier = sel ? findMonthly(sel.amount) : null;
  const dailyTotal = sel ? Math.ceil(sel.amount * days * pct / 100) : 0;
  const isLongStay = days >= 31;

  const suggestsHtml = hits.length === 0
    ? `<div class="dim small">未列載 — 將按該國「其他」或該區「其他」支給。</div>`
    : hits.map(h => `
        <button class="sugg ${sel===h?"on":""}" data-act="pick-city" data-v="${escAttr(h.city)}">
          <span>${esc(h.city)}</span>
          <span class="dim">${esc(h.country)}</span>
          <span class="num mono">${esc(h.amount)}</span>
        </button>
      `).join("");

  let monthlyBlock = "";
  if (sel) {
    if (tier) {
      const longStayMonths = Math.floor(days / 30);
      const longStayDays = days % 30;
      const longStayTotal = (longStayMonths * tier.monthly) + Math.round(longStayDays * tier.monthly / 30);
      monthlyBlock = `
        <div class="calc-monthly">
          <div class="section-kicker mono">月支生活費(派外進修/研究/實習 &ge; 31 日)</div>
          <div class="calc-monthly-row">
            <span class="calc-monthly-amt mono">USD ${tier.monthly.toLocaleString()} <span class="dim small">/月</span></span>
            <span class="dim small">日支級距 ${esc(tier.range)} &rarr; 月支 ${tier.monthly.toLocaleString()}</span>
          </div>
          ${isLongStay
            ? `<div class="calc-monthly-hint mono">本次 ${days} 日 &ge; 31 日 · 改採月支:${longStayMonths} 個月 &times; ${tier.monthly.toLocaleString()} + ${longStayDays} 日 &times; (${tier.monthly.toLocaleString()} &divide; 30) &asymp; <strong>USD ${longStayTotal.toLocaleString()}</strong></div>`
            : `<div class="calc-monthly-hint dim">短期出差(未滿 31 日)以日支為主,此區僅供長期派駐參考。</div>`
          }
          <button class="ref-link" data-act="open-node" data-id="A-國外旅費-024">
            <div class="ref-id mono">A-國外旅費-024</div>
            <div class="ref-title">月支生活費級距表 + 計算規則</div>
          </button>
        </div>
      `;
    } else {
      monthlyBlock = `
        <div class="calc-monthly">
          <div class="section-kicker mono">月支生活費(派外進修/研究/實習 &ge; 31 日)</div>
          <div class="dim small">該日支金額無對應月支級距(範圍外)。</div>
        </div>
      `;
    }
  }

  const refIds = ["A-國外旅費-007", "B-國外旅費-003", "A-國外旅費-024", "C-國外旅費-012"];
  const refsHtml = refIds.map(id => {
    const n = NODE_BY_ID[id]; if (!n) return "";
    return `<button class="ref-link" data-act="open-node" data-id="${escAttr(id)}">
      <div class="ref-id mono">${esc(id)}</div>
      <div class="ref-title">${esc(n.title)}</div>
    </button>`;
  }).join("");

  const outBody = sel ? `
    <div class="calc-bigamt mono">USD ${dailyTotal.toLocaleString()}</div>
    <div class="calc-formula mono">${sel.amount} &times; ${days} 天 &times; ${pct}% = ${dailyTotal} (尾數進位)</div>
    <div class="calc-pickline">
      <span class="dim mono">城市</span><span>${esc(sel.city)}</span>
      <span class="dim mono">國家</span><span>${esc(sel.country)}</span>
      <span class="dim mono">區域</span><span>${esc(sel.region)}</span>
    </div>
    ${monthlyBlock}
  ` : `<div class="dim">輸入城市以開始試算。</div>`;

  return `
    <div class="calc-pane bg-peach">
      <div class="calc-grid">
        <div class="calc-form">
          <label class="field">
            <span class="field-label mono">搜尋城市 · 國家</span>
            <input class="big-input" id="calc-daily-q" value="${escAttr(q)}" placeholder="東京 · Tokyo · Japan⋯" />
          </label>
          <div class="calc-suggests">${suggestsHtml}</div>
          <label class="field">
            <span class="field-label mono">出差天數</span>
            <div class="stepper">
              <button data-act="calc-days-dec">&minus;</button>
              <input class="big-input num mono" id="calc-daily-days" value="${escAttr(days)}" />
              <button data-act="calc-days-inc">+</button>
            </div>
          </label>
          <label class="field">
            <span class="field-label mono">百分率(配偶/眷屬同行折算)</span>
            <div class="seg">
              ${[100, 80, 50].map(v => `<button class="seg-btn ${pct===v?"on":""}" data-act="set-pct" data-v="${v}">${v}%</button>`).join("")}
            </div>
          </label>
        </div>
        <div class="calc-out">
          <div class="calc-out-kicker mono">試算結果(短期出差 · 日支)</div>
          ${outBody}
          <div class="calc-refs">
            <div class="section-kicker mono">援引依據</div>
            ${refsHtml}
          </div>
        </div>
      </div>
    </div>
  `;
}

            ${refsHtml}

        </div>

  `;
}

// ── Drawer ──
function renderRateTablePreview(rt) {
  if (rt.lookup_type === "insurance") {
    return `<div class="section">
      <div class="section-kicker mono">費率查詢</div>
      <p class="section-body">至「試算表」查詢國外旅行平安保險費(依天數與地區)。</p>
    </div>`;
  }
  const q = state.rateTableQ;
  const ql = q.toLowerCase();
  const matchRow = (r) => !q || r.some(c => String(typeof c === "object" && c !== null ? c.v : c).toLowerCase().includes(ql));

  const renderRow = (r, i) => `<tr>${r.map(c => {
    const isObj = typeof c === "object" && c !== null;
    const v = isObj ? c.v : c;
    const cls = (typeof c === "number") ? "num mono" : "";
    return `<td class="${cls}">${esc(v)}</td>`;
  }).join("")}</tr>`;

  let bodyHtml;
  if (rt.sectioned && rt.sections) {
    bodyHtml = rt.sections.map(sec => {
      const rows = (sec.rows || []).filter(matchRow);
      return `<tbody>
        <tr class="sec-row"><td colspan="${(rt.headers || []).length}" class="mono">${esc(sec.title)}</td></tr>
        ${rows.map(renderRow).join("")}
      </tbody>`;
    }).join("");
  } else {
    const rows = (rt.rows || []).filter(matchRow);
    bodyHtml = `<tbody>${rows.map(renderRow).join("")}</tbody>`;
  }

  const headHtml = rt.headers
    ? `<thead><tr>${rt.headers.map(h => `<th>${esc(h)}</th>`).join("")}</tr></thead>`
    : "";

  return `
    <div class="section">
      <div class="section-head">
        <div class="section-kicker mono">${esc(rt.caption || "")} · 單位 ${esc(rt.unit || "")}</div>
        <div class="dim mono">生效 ${esc(rt.effective || "")}</div>
      </div>
      ${rt.searchable ? `<input class="search-input small" id="rt-search" placeholder="搜尋城市/國家⋯" value="${escAttr(q)}" />` : ""}
      <div class="ratetable-wrap">
        <table class="ratetable">
          ${headHtml}
          ${bodyHtml}
        </table>
      </div>
    </div>
  `;
}

function drawerListContext() {
  // Determine which list the drawer's prev/next walks
  const ids = state.drawerListIds;
  if (ids && ids.length) {
    return ids.map(id => NODE_BY_ID[id]).filter(Boolean);
  }
  return window.KB_NODES || [];
}

function renderDrawer() {
  const node = state.drawerNode;
  if (!node) return "";
  const tone = categoryTone(node.parent);
  const list = drawerListContext();
  const idx = list.findIndex(n => n.id === node.id);
  const prevNode = idx > 0 ? list[idx - 1] : null;
  const nextNode = idx >= 0 && idx < list.length - 1 ? list[idx + 1] : null;

  const banners = [];
  if (node.certainty === "inferred") banners.push(`<div class="banner banner-amber"><strong>推論 · Inferred</strong> ${esc(node.no_inference_note || "")}</div>`);
  if (node.certainty === "contested") banners.push(`<div class="banner banner-rose"><strong>爭議 · Contested</strong> ${esc(node.no_inference_note || "")}</div>`);
  if (node.status === "已廢止") banners.push(`<div class="banner banner-gray"><strong>此表已廢止</strong> 適用期間 ${esc(node.effective_period || "—")}。新版見 ${esc(node.superseded_by || "—")}。</div>`);

  const sourceHtml = node.source_url
    ? `<a class="mono" href="${escAttr(node.source_url)}" target="_blank" rel="noopener">${esc(node.source || "")} &#x2197;</a>`
    : `<span class="mono dim">${esc(node.source || "—")}</span>`;

  const tagsHtml = (node.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join("");

  const related = (window.KB_NODES || [])
    .filter(o => o.id !== node.id && o.parent === node.parent)

    <button class="related-item" data-act="open-node" data-id="${escAttr(o.id)}">

  const navHtml = idx >= 0 ? `

      <button data-act="drawer-prev" ${prevNode ? "" : "disabled"} title="上一張(&larr;)">&lsaquo;</button>
      <span class="nav-counter">${idx + 1} / ${list.length}</span>
      <button data-act="drawer-next" ${nextNode ? "" : "disabled"} title="下一張(&rarr;)">&rsaquo;</button>

  return `
    <div class="overlay" data-act="close-drawer">
      <aside class="drawer bg-${tone}" data-stop="1">
        <div class="drawer-top">
          <div class="drawer-meta mono">

            <span>${esc(nodeTypeLabel(node.type))}</span>
            <span>${esc(node.parent)}</span>
            ${navHtml}
          </div>
          <button class="modal-close" data-act="close-drawer">關閉 &#x2715;</button>
        </div>
        ${banners.join("")}

        <div class="drawer-summary">${esc(node.summary)}</div>

        <div class="kv">
          <div class="kv-row"><span class="kv-k mono">主管機關</span><span>${esc(node.agency || "—")}</span></div>
          <div class="kv-row"><span class="kv-k mono">版本</span><span class="mono">${esc(node.version || "—")}</span></div>
          <div class="kv-row"><span class="kv-k mono">最後審校</span><span class="mono">${esc(node.reviewed || "—")} · ${esc(node.review_level || "—")}</span></div>
          <div class="kv-row"><span class="kv-k mono">原始出處</span>${sourceHtml}</div>
        </div>

        ${node.rate_table ? renderRateTablePreview(node.rate_table) : ""}

        <div class="drawer-tags">${tagsHtml}</div>

        <div class="related">
          <div class="section-kicker mono">相關規定</div>

// ── Scenario Modal ──
function computeFlowKey(flow, path) {
  if (!flow) return null;
  let cur = flow.start;
  for (const step of path) {
    const q = flow.questions[step.qkey];
    if (!q) break;
    const opt = (q.options || []).find(o => o.label === step.optionLabel);
    if (!opt) break;
    if (opt.conclude) return { conclude: opt.conclude };
    if (opt.next) cur = opt.next;
  }
  return cur ? { ask: cur } : null;
}

function renderScenarioModal() {
  const s = state.scenarioOpen;
  if (!s) return "";
  const flow = s.flow;
  const path = state.scenarioPath || [];
  const key = computeFlowKey(flow, path);
  const conclusion = (key && key.conclude && flow) ? flow.conclusions[key.conclude] : null;
  const askQ = (key && key.ask && flow) ? flow.questions[key.ask] : null;
  const refIds = (conclusion && conclusion.refs) || s.primary_ids || [];
  const refs = refIds.map(id => NODE_BY_ID[id]).filter(Boolean);

  const flowStepsHtml = !flow ? "" : `
    <div class="flow-box">
      <div class="section-kicker mono">逐步問答 · Decision flow</div>
      <ol class="flow-steps">
        ${path.map((step, i) => {
          const q = flow.questions[step.qkey];
          if (!q) return "";
          return `<li class="flow-step done">
            <div class="flow-q">${esc(q.label)}</div>
            <div class="flow-a">&rarr; ${esc(step.optionLabel)}</div>
          </li>`;
        }).join("")}
        ${askQ ? `<li class="flow-step active">
          <div class="flow-q">${esc(askQ.label)}</div>
          ${askQ.hint ? `<div class="flow-hint">${esc(askQ.hint)}</div>` : ""}
          <div class="flow-options">
            ${(askQ.options || []).map(opt => `<button class="flow-opt" data-act="flow-pick" data-qkey="${escAttr(key.ask)}" data-label="${escAttr(opt.label)}">${esc(opt.label)}</button>`).join("")}
          </div>
        </li>` : ""}
        ${conclusion ? `<li class="flow-step conclusion">
          <div class="conc-kicker mono">結論</div>
          <div class="conc-title">${esc(conclusion.title)}</div>
          <div class="conc-limit">${esc(conclusion.limit)}</div>
          ${conclusion.note ? `<div class="conc-note">${esc(conclusion.note)}</div>` : ""}
        </li>` : ""}
      </ol>
      ${path.length > 0 ? `<button class="link-cta sub small" data-act="flow-reset">&#x21BA; 重新作答</button>` : ""}
    </div>
  `;

  const concBox = !flow ? `
    <div class="section">
      <div class="section-kicker mono">概要</div>
      <p class="section-body">${esc(s.subtitle)}。本情境牽涉 ${esc((s.tags || []).join("、"))}。</p>
    </div>
  ` : "";

  const attachments = s.attachments || [];
  const checklistHtml = `
    <div class="section">
      <div class="section-kicker mono">需附單據</div>
      <ol class="checklist">
        ${attachments.map((a, i) => `<li><span class="num mono">${String(i + 1).padStart(2, "0")}</span>${esc(a)}</li>`).join("")}
      </ol>
    </div>
  `;

  const approvers = s.approvers || [];
  const approveHtml = `
    <div class="section">
      <div class="section-kicker mono">核章流程</div>
      <div class="approve-flow">
        ${approvers.map((a, i, arr) => `
          <span class="approve-step">${esc(a)}</span>
          ${i < arr.length - 1 ? `<span class="approve-arrow">&rarr;</span>` : ""}
        `).join("")}
      </div>
    </div>
  `;

  const refsHtml = refs.map(n => `
    <li class="ref-item">
      <button class="ref-link" data-act="open-node-from-scenario" data-id="${escAttr(n.id)}">
        <div class="ref-id mono">${esc(n.id)}</div>
        <div class="ref-title">${esc(n.title)}</div>
        <div class="ref-summary">${esc((n.summary || "").slice(0, 80))}⋯</div>
      </button>
    </li>
  `).join("");

  return `
    <div class="overlay" data-act="close-scenario">
      <div class="modal scen-modal bg-${categoryTone(s.parent)}" data-stop="1">
        <div class="modal-top">
          <div class="modal-meta mono">
            <span>情境</span><span>${esc(s.parent)}</span><span>${esc(s.expense || "")}</span>
          </div>
          <button class="modal-close" data-act="close-scenario">關閉 &#x2715;</button>
        </div>
        <h2 class="modal-title">${esc(s.title)}</h2>
        <p class="modal-sub">${esc(s.subtitle)}</p>

        <div class="modal-grid">
          <div class="modal-col">
            ${flowStepsHtml}
            ${concBox}
            ${checklistHtml}

          <aside class="modal-aside">

// ── Cmd-K ──
function cmdkItems() {
  const out = [];
  out.push({ kind: "view", label: "前往 · 情境檢索", view: "scenarios" });
  out.push({ kind: "view", label: "前往 · 條文庫",   view: "corpus" });
  out.push({ kind: "view", label: "前往 · 試算表",   view: "calc" });
  for (const s of (window.KB_SCENARIOS || [])) {
    out.push({ kind: "scenario", label: s.title, sub: s.subtitle, sid: s.id });
  }
  for (const n of (window.KB_NODES || [])) {
    out.push({ kind: "node", label: n.title, sub: `${n.id} · ${n.parent}`, nid: n.id });
  }
  const q = (state.cmdkQuery || "").trim();
  if (!q) return out.slice(0, 30);
  const ql = q.toLowerCase();
  return out.filter(it => (it.label + (it.sub || "")).toLowerCase().includes(ql)).slice(0, 40);
}

function renderCmdK() {
  if (!state.cmdkOpen) return "";
  const items = cmdkItems();
  const hi = Math.max(0, Math.min(state.cmdkHi, items.length - 1));
  const itemsHtml = items.length === 0
    ? `<div class="empty small">沒有結果。</div>`
    : items.map((it, i) => `
        <button class="cmdk-item ${i===hi?"on":""}" data-act="cmdk-pick" data-i="${i}">
          <span class="cmdk-kind mono">${({view:"頁",scenario:"情境",node:"條文"})[it.kind] || ""}</span>
          <span class="cmdk-label">${esc(it.label)}</span>
          ${it.sub ? `<span class="cmdk-sub mono">${esc(it.sub)}</span>` : ""}
        </button>
      `).join("");
  return `
    <div class="overlay" data-act="close-cmdk">
      <div class="cmdk" data-stop="1">
        <div class="cmdk-head">
          <input id="cmdk-input" class="cmdk-input" placeholder="搜尋條文 · 城市 · 情境⋯⋯" value="${escAttr(state.cmdkQuery)}" />
          <kbd>ESC</kbd>
        </div>
        <div class="cmdk-list">${itemsHtml}</div>
        <div class="cmdk-foot mono">
          <span>↑↓ 選擇</span><span>↵ 開啟</span><span>esc 關閉</span>
        </div>
      </div>
    </div>
  `;
}

// ── Top-level render ──
function render() {
  const root = document.getElementById("root");
  let viewHtml = "";
  if (state.view === "landing")   viewHtml = renderLanding();
  if (state.view === "scenarios") viewHtml = renderScenarios();
  if (state.view === "corpus")    viewHtml = renderCorpus();
  if (state.view === "calc")      viewHtml = renderCalc();

  // Cache active input + selection BEFORE replacing innerHTML so we can restore focus
  const active = document.activeElement;
  const activeId = active && active.id ? active.id : null;
  const selStart = active && active.selectionStart != null ? active.selectionStart : null;
  const selEnd   = active && active.selectionEnd   != null ? active.selectionEnd   : null;

  root.innerHTML = `
    <div class="shell serif-on density-comfortable">
      ${renderTopbar()}
      <main class="main">${viewHtml}</main>
      ${renderFooter()}
      ${state.drawerNode ? renderDrawer() : ""}
      ${state.scenarioOpen ? renderScenarioModal() : ""}
      ${state.cmdkOpen ? renderCmdK() : ""}
    </div>
  `;

  // Restore focus to text inputs when user is typing (avoids losing focus on each keystroke)
  if (activeId) {
    const el = document.getElementById(activeId);
    if (el && el.focus) {
      el.focus();
      if (selStart != null && el.setSelectionRange) {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) {}
      }
    }
  } else if (state.cmdkOpen) {
    const el = document.getElementById("cmdk-input");
    if (el) el.focus();
  }
}

// ─────────────────────────────────────────────────────────────────
// HANDLERS — event delegation on document
// ─────────────────────────────────────────────────────────────────

function handleClick(e) {
  // overlay-stop: clicks inside data-stop="1" should not bubble to overlay close
  let walker = e.target;
  let inStop = false;
  while (walker && walker !== document.body) {
    if (walker.dataset && walker.dataset.stop === "1") { inStop = true; break; }
    walker = walker.parentElement;
  }

  // find nearest [data-act]
  let el = e.target.closest("[data-act]");
  if (!el) return;
  const act = el.dataset.act;

  // overlay close acts: only fire when click was directly on overlay (not on stop ancestor)
  if ((act === "close-drawer" || act === "close-scenario" || act === "close-cmdk") && inStop && el.classList.contains("overlay") === false) {
    // Click was inside the modal/drawer/cmdk panel — respect explicit close buttons
    if (!el.classList.contains("modal-close")) return;
  }

  switch (act) {
    case "goto": {
      const v = el.dataset.view;
      setState({ view: v, filterParent: null });
      break;
    }
    case "pick-cat": {
      const cat = el.dataset.cat;
      setState({ view: "corpus", filterParent: cat });
      break;
    }
    case "open-node": {
      const id = el.dataset.id;
      const n = NODE_BY_ID[id];
      if (n) {
        // If we're in corpus, set drawer list to filtered ids
        const listIds = state.view === "corpus" ? corpusFiltered().map(x => x.id) : null;
        setState({ drawerNode: n, drawerListIds: listIds, rateTableQ: "" });
      }
      break;
    }
    case "open-node-from-scenario": {
      const id = el.dataset.id;
      const n = NODE_BY_ID[id];
      if (n) setState({ scenarioOpen: null, scenarioPath: [], drawerNode: n, drawerListIds: null, rateTableQ: "" });
      break;
    }
    case "drawer-prev":
    case "drawer-next": {
      const list = drawerListContext();
      const idx = list.findIndex(n => n.id === state.drawerNode.id);
      if (idx < 0) break;
      const target = act === "drawer-prev" ? list[idx - 1] : list[idx + 1];
      if (target) setState({ drawerNode: target, rateTableQ: "" });
      break;
    }
    case "close-drawer": {
      // Only close on overlay click (not panel inner)
      if (el.classList.contains("overlay") || el.classList.contains("modal-close")) {
        setState({ drawerNode: null, drawerListIds: null, rateTableQ: "" });
      }
      break;
    }
    case "open-scenario": {
      const id = el.dataset.id;
      const s = (window.KB_SCENARIOS || []).find(x => x.id === id);
      if (s) setState({ scenarioOpen: s, scenarioPath: [] });
      break;
    }
    case "close-scenario": {
      if (el.classList.contains("overlay") || el.classList.contains("modal-close")) {
        setState({ scenarioOpen: null, scenarioPath: [] });
      }
      break;
    }
    case "flow-pick": {
      const qkey = el.dataset.qkey;
      const label = el.dataset.label;
      setState({ scenarioPath: [...state.scenarioPath, { qkey, optionLabel: label }] });
      break;
    }
    case "flow-reset": {
      setState({ scenarioPath: [] });
      break;
    }
    case "set-type":      { setState({ corpusType: el.dataset.v }); break; }
    case "set-parent":    { setState({ filterParent: el.dataset.v || null }); break; }
    case "set-status":    { setState({ corpusStatus: el.dataset.v }); break; }
    case "set-certainty": { setState({ corpusCertainty: el.dataset.v }); break; }
    case "set-calctab":   { setState({ calcTab: el.dataset.v }); break; }
    case "set-pct":       { setState({ calcDailyPct: parseInt(el.dataset.v, 10) }); break; }
    case "set-region":    { setState({ calcInsRegion: el.dataset.v }); break; }
    case "set-hoteltype": { setState({ calcHotelType: el.dataset.v }); break; }
    case "calc-days-dec": { setState({ calcDailyDays: Math.max(1, state.calcDailyDays - 1) }); break; }
    case "calc-days-inc": { setState({ calcDailyDays: state.calcDailyDays + 1 }); break; }
    case "ins-days-dec":  { setState({ calcInsDays: Math.max(1, state.calcInsDays - 1) }); break; }
    case "ins-days-inc":  { setState({ calcInsDays: state.calcInsDays + 1 }); break; }
    case "hotel-nights-dec": { setState({ calcHotelNights: Math.max(1, state.calcHotelNights - 1) }); break; }
    case "hotel-nights-inc": { setState({ calcHotelNights: state.calcHotelNights + 1 }); break; }
    case "pick-city":     { setState({ calcDailyQ: el.dataset.v }); break; }
    case "cmdk-open":     { setState({ cmdkOpen: true, cmdkQuery: "", cmdkHi: 0 }); break; }
    case "close-cmdk": {
      if (el.classList.contains("overlay")) setState({ cmdkOpen: false });
      break;
    }
    case "cmdk-pick": {
      const i = parseInt(el.dataset.i, 10);
      const items = cmdkItems();
      const it = items[i];
      if (!it) break;
      if (it.kind === "view")     setState({ cmdkOpen: false, view: it.view, filterParent: null });
      if (it.kind === "scenario") {
        const s = (window.KB_SCENARIOS || []).find(x => x.id === it.sid);
        if (s) setState({ cmdkOpen: false, scenarioOpen: s, scenarioPath: [] });
      }
      if (it.kind === "node") {
        const n = NODE_BY_ID[it.nid];
        if (n) setState({ cmdkOpen: false, drawerNode: n, drawerListIds: null, rateTableQ: "" });
      }
      break;
    }
  }
}

// Inputs use 'input' event with debounced state update so caret position stays put
function handleInput(e) {
  const t = e.target;
  if (!t || !t.id) return;
  switch (t.id) {
    case "scen-search":         setState({ scenQ: t.value }); break;
    case "corpus-search":       setState({ corpusQ: t.value }); break;
    case "calc-daily-q":        setState({ calcDailyQ: t.value }); break;
    case "calc-daily-days":     setState({ calcDailyDays: Math.max(1, parseInt(t.value, 10) || 1) }); break;
    case "calc-ins-days":       setState({ calcInsDays: Math.max(1, parseInt(t.value, 10) || 1) }); break;
    case "calc-hotel-nights":   setState({ calcHotelNights: Math.max(1, parseInt(t.value, 10) || 1) }); break;
    case "rt-search":           setState({ rateTableQ: t.value }); break;
    case "cmdk-input":          setState({ cmdkQuery: t.value, cmdkHi: 0 }); break;
  }
}

function handleKeydown(e) {
  // Cmd-K / Ctrl-K toggle
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
    e.preventDefault();
    setState({ cmdkOpen: !state.cmdkOpen, cmdkQuery: "", cmdkHi: 0 });
    return;
  }
  if (e.key === "Escape") {
    if (state.cmdkOpen)        { setState({ cmdkOpen: false }); return; }
    if (state.scenarioOpen)    { setState({ scenarioOpen: null, scenarioPath: [] }); return; }
    if (state.drawerNode)      { setState({ drawerNode: null, drawerListIds: null }); return; }
  }
  // CmdK arrow nav
  if (state.cmdkOpen) {
    if (e.key === "ArrowDown") {
      e.preventDefault();
      const items = cmdkItems();
      setState({ cmdkHi: Math.min(items.length - 1, state.cmdkHi + 1) });
      return;
    }
    if (e.key === "ArrowUp") {
      e.preventDefault();
      setState({ cmdkHi: Math.max(0, state.cmdkHi - 1) });
      return;
    }
    if (e.key === "Enter") {
      e.preventDefault();
      const items = cmdkItems();
      const it = items[state.cmdkHi];
      if (!it) return;
      if (it.kind === "view")     setState({ cmdkOpen: false, view: it.view, filterParent: null });
      else if (it.kind === "scenario") {
        const s = (window.KB_SCENARIOS || []).find(x => x.id === it.sid);
        if (s) setState({ cmdkOpen: false, scenarioOpen: s, scenarioPath: [] });
      }
      else if (it.kind === "node") {
        const n = NODE_BY_ID[it.nid];
        if (n) setState({ cmdkOpen: false, drawerNode: n, drawerListIds: null, rateTableQ: "" });
      }
      return;
    }
  }
  // Drawer left/right (skip when typing in input/textarea)
  if (state.drawerNode) {
    const ae = document.activeElement;
    const isText = ae && ae.matches && ae.matches("input,textarea,[contenteditable]");
    if (isText) return;
    if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
      const list = drawerListContext();
      const idx = list.findIndex(n => n.id === state.drawerNode.id);
      if (idx < 0) return;
      const target = e.key === "ArrowLeft" ? list[idx - 1] : list[idx + 1];
      if (target) {
        e.preventDefault();
        setState({ drawerNode: target, rateTableQ: "" });
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────────
// BOOTSTRAP
// ─────────────────────────────────────────────────────────────────
document.addEventListener("click", handleClick);
document.addEventListener("input", handleInput);
window.addEventListener("keydown", handleKeydown);

// 進站立即顯示 loading state(避免空白閃光),再 fetch 真實資料後 re-render
document.getElementById("root").innerHTML = '<div class="empty mono" style="padding:120px 40px">載入資料中⋯⋯</div>';
loadData().then(() => render()).catch(err => {
  console.error("loadData failed", err);
  document.getElementById("root").innerHTML = '<div class="empty" style="padding:120px 40px;color:var(--c-accent)">資料載入失敗:' + (err && err.message || err) + '</div>';
});
</script>
</body>
</html>
