<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>條文庫 — 重新設計 Demo</title>
<style>
  :root {
    --bg: oklch(99% 0.004 90);
    --surface: oklch(100% 0 0);
    --surface-2: oklch(97.2% 0.005 90);
    --line: oklch(91% 0.006 90);
    --line-strong: oklch(85% 0.008 90);
    --ink: oklch(22% 0.012 265);
    --ink-2: oklch(40% 0.012 265);
    --ink-3: oklch(56% 0.012 265);
    --brand: oklch(55% 0.15 265);
    --brand-soft: oklch(96% 0.025 265);
    --brand-line: oklch(85% 0.06 265);
    --ok: oklch(58% 0.13 155);
    --ok-soft: oklch(95% 0.03 155);
    --warn: oklch(68% 0.14 75);
    --warn-soft: oklch(96% 0.04 75);
    --stop: oklch(60% 0.14 25);
    --stop-soft: oklch(96% 0.03 25);
    --shadow-sm: 0 1px 2px oklch(20% 0.02 265 / .04), 0 1px 1px oklch(20% 0.02 265 / .03);
    --shadow-md: 0 4px 12px oklch(20% 0.02 265 / .06), 0 2px 4px oklch(20% 0.02 265 / .04);
    --shadow-lg: 0 24px 60px oklch(20% 0.02 265 / .14), 0 8px 20px oklch(20% 0.02 265 / .08);
    --radius: 10px;
    --radius-lg: 14px;
    --font-zh: "Noto Sans TC", "Noto Sans CJK TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: oklch(16% 0.012 265);
      --surface: oklch(20% 0.014 265);
      --surface-2: oklch(23% 0.014 265);
      --line: oklch(28% 0.014 265);
      --line-strong: oklch(34% 0.016 265);
      --ink: oklch(96% 0.005 265);
      --ink-2: oklch(78% 0.01 265);
      --ink-3: oklch(60% 0.012 265);
      --brand: oklch(72% 0.14 265);
      --brand-soft: oklch(28% 0.05 265);
      --brand-line: oklch(40% 0.08 265);
      --ok-soft: oklch(28% 0.04 155);
      --warn-soft: oklch(28% 0.05 75);
      --stop-soft: oklch(28% 0.04 25);
      --shadow-md: 0 4px 12px #0007;
      --shadow-lg: 0 24px 60px #000a;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-zh);
    color: var(--ink);
    background: var(--bg);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  button { font: inherit; color: inherit; }
  ::selection { background: var(--brand-soft); color: var(--ink); }

  /* ───── App shell ───── */
  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  @media (max-width: 880px) { .app { grid-template-columns: 1fr; } }

  /* ───── Sidebar ───── */
  .side {
    border-right: 1px solid var(--line);
    padding: 18px 14px;
    position: sticky; top: 0; height: 100vh; overflow: auto;
    background: var(--bg);
  }
  @media (max-width: 880px) { .side { display: none; } }
  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 8px 18px;
  }
  .brand-mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, var(--brand), oklch(60% 0.15 295));
    display: grid; place-items: center;
    color: white; font-weight: 700; font-size: 13px;
    box-shadow: var(--shadow-sm);
  }
  .brand-text { font-weight: 600; font-size: 14px; letter-spacing: .01em; }
  .brand-text small { display: block; font-weight: 400; color: var(--ink-3); font-size: 11px; letter-spacing: .04em; }

  .nav-group { margin-top: 14px; }
  .nav-label {
    font-size: 11px; color: var(--ink-3); padding: 0 8px 6px;
    text-transform: uppercase; letter-spacing: .08em; font-weight: 600;
  }
  .nav-item {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
    padding: 7px 8px; border-radius: 8px; cursor: pointer;
    color: var(--ink-2); font-size: 14px;
    user-select: none;
  }
  .nav-item > span:first-child {
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .nav-count { flex-shrink: 0; }
  .nav-item:hover { background: var(--surface-2); color: var(--ink); }
  .nav-item.active { background: var(--brand-soft); color: var(--brand); font-weight: 500; }
  .nav-count { font-size: 12px; color: var(--ink-3); font-variant-numeric: tabular-nums; }
  .nav-item.active .nav-count { color: var(--brand); opacity: .8; }

  /* ───── Main ───── */
  .main { padding: 28px 32px 80px; max-width: 1400px; }
  @media (max-width: 880px) { .main { padding: 16px 16px 80px; } }

  .topbar {
    display: flex; gap: 12px; align-items: center; margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .search {
    flex: 1; min-width: 240px;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); transition: border-color .15s, box-shadow .15s;
  }
  .search:focus-within { border-color: var(--brand-line); box-shadow: 0 0 0 4px var(--brand-soft); }
  .search input { flex: 1; border: 0; background: transparent; outline: none; font-size: 14px; color: var(--ink); }
  .search input::placeholder { color: var(--ink-3); }
  .kbd {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--ink-3); padding: 2px 6px; border: 1px solid var(--line-strong);
    border-radius: 5px; background: var(--surface-2);
  }
  .icon { width: 16px; height: 16px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

  .pagehead { margin-bottom: 20px; }
  .pagehead h1 { margin: 0 0 4px; font-size: 22px; font-weight: 600; letter-spacing: -.01em; }
  .pagehead p { margin: 0; color: var(--ink-3); font-size: 13px; }

  .filterbar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px;
    padding-bottom: 18px; border-bottom: 1px solid var(--line);
  }
  .chip {
    border: 1px solid var(--line); background: var(--surface);
    padding: 5px 11px; border-radius: 999px; font-size: 12.5px;
    color: var(--ink-2); cursor: pointer; transition: all .12s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .chip:hover { border-color: var(--line-strong); color: var(--ink); }
  .chip.on {
    background: var(--ink); color: var(--bg); border-color: var(--ink);
  }
  .chip-count { font-size: 11px; opacity: .65; font-variant-numeric: tabular-nums; }

  /* ───── Cards grid ───── */
  .grid {
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 18px 18px 14px;
    cursor: pointer;
    transition: transform .14s ease, box-shadow .14s ease, border-color .14s;
    position: relative;
    display: flex; flex-direction: column; gap: 10px;
    min-height: 178px;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--line-strong);
  }
  .card.active {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }
  .card-eyebrow {
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--ink-3); letter-spacing: .03em;
  }
  .card-art {
    width: 6px; height: 6px; border-radius: 999px;
    background: var(--ink-3);
  }
  .card-art.dot-travel { background: oklch(60% 0.13 240); }
  .card-art.dot-food { background: oklch(65% 0.13 75); }
  .card-art.dot-overseas { background: oklch(60% 0.13 320); }
  .card-art.dot-rate { background: oklch(58% 0.13 155); }

  .card-no { font-weight: 500; color: var(--ink-2); }
  .card-title {
    font-size: 17px; font-weight: 600; letter-spacing: -.005em;
    line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary {
    color: var(--ink-2); font-size: 13.5px; line-height: 1.55;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1;
  }
  .card-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 10px; border-top: 1px dashed var(--line);
    font-size: 11.5px; color: var(--ink-3);
  }
  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; padding: 2px 7px; border-radius: 5px;
    background: var(--surface-2); color: var(--ink-2);
    border: 1px solid var(--line);
  }
  .badge {
    font-size: 10.5px; padding: 2px 7px; border-radius: 4px;
    font-weight: 600; letter-spacing: .04em;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .badge.ok { background: var(--ok-soft); color: var(--ok); }
  .badge.warn { background: var(--warn-soft); color: var(--warn); }
  .badge.stop { background: var(--stop-soft); color: var(--stop); }
  .badge::before {
    content: ""; width: 5px; height: 5px; border-radius: 999px; background: currentColor;
  }

  /* ───── Drawer ───── */
  .scrim {
    position: fixed; inset: 0; background: oklch(20% 0.02 265 / .35);
    opacity: 0; pointer-events: none; transition: opacity .2s;
    z-index: 40;
    backdrop-filter: blur(2px);
  }
  .scrim.show { opacity: 1; pointer-events: auto; }

  .drawer {
    position: fixed; top: 0; right: 0; height: 100vh; width: min(540px, 100%);
    background: var(--surface);
    border-left: 1px solid var(--line);
    box-shadow: var(--shadow-lg);
    transform: translateX(100%); transition: transform .28s cubic-bezier(.2,.8,.2,1);
    z-index: 50;
    display: flex; flex-direction: column;
  }
  .drawer.show { transform: translateX(0); }
  @media (max-width: 720px) {
    .drawer {
      top: auto; bottom: 0; right: 0; left: 0;
      width: 100%; height: 88vh;
      border-left: 0; border-top: 1px solid var(--line);
      border-radius: 16px 16px 0 0;
      transform: translateY(100%);
    }
    .drawer.show { transform: translateY(0); }
    .drawer-grab {
      width: 40px; height: 4px; border-radius: 999px;
      background: var(--line-strong); margin: 8px auto 0;
    }
  }
  .drawer-grab { display: none; }
  @media (max-width: 720px) { .drawer-grab { display: block; } }

  .drawer-head {
    padding: 18px 22px 16px; border-bottom: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 8px;
  }
  .drawer-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .drawer-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-3); }
  .drawer-meta .sep { width: 3px; height: 3px; border-radius: 999px; background: var(--line-strong); }
  .drawer-actions { display: flex; gap: 4px; }
  .iconbtn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid transparent; background: transparent; cursor: pointer;
    display: grid; place-items: center; color: var(--ink-2);
    transition: background .12s, border-color .12s;
  }
  .iconbtn:hover { background: var(--surface-2); border-color: var(--line); color: var(--ink); }
  .drawer-title { font-size: 22px; font-weight: 600; letter-spacing: -.01em; line-height: 1.3; margin: 2px 0; }

  .drawer-body {
    flex: 1; overflow: auto;
    padding: 20px 22px 80px;
  }
  .section { margin-bottom: 28px; }
  .section h3 {
    margin: 0 0 10px; font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em; color: var(--ink-3);
    display: flex; align-items: center; gap: 8px;
  }
  .section h3::before {
    content: ""; width: 14px; height: 1px; background: var(--line-strong);
  }
  .article {
    background: var(--surface-2); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 16px 18px;
    font-size: 14.5px; line-height: 1.85; color: var(--ink);
    white-space: pre-wrap;
  }
  .keypoints { display: flex; flex-direction: column; gap: 6px; padding: 0; margin: 0; list-style: none; }
  .keypoints li {
    display: grid; grid-template-columns: 18px 1fr; gap: 8px;
    padding: 6px 0; font-size: 14px;
  }
  .keypoints li::before {
    content: "→"; color: var(--brand); font-family: var(--font-mono);
  }
  .related {
    display: flex; flex-direction: column; gap: 8px;
  }
  .related-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px;
    border: 1px solid var(--line); border-radius: 9px;
    cursor: pointer; transition: all .12s;
    background: var(--surface);
  }
  .related-item:hover { border-color: var(--brand-line); background: var(--brand-soft); }
  .related-kind {
    font-family: var(--font-mono); font-size: 10.5px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
    background: var(--surface-2); color: var(--ink-2);
    flex-shrink: 0; margin-top: 1px;
  }
  .related-kind.qa { background: oklch(96% 0.03 200); color: oklch(45% 0.13 220); }
  .related-kind.fn { background: oklch(96% 0.03 295); color: oklch(45% 0.13 295); }
  @media (prefers-color-scheme: dark) {
    .related-kind.qa { background: oklch(28% 0.05 220); color: oklch(82% 0.1 220); }
    .related-kind.fn { background: oklch(28% 0.05 295); color: oklch(82% 0.1 295); }
  }
  .related-text { font-size: 13.5px; line-height: 1.5; color: var(--ink); }
  .related-text small { display: block; color: var(--ink-3); font-size: 11.5px; margin-top: 2px; }

  .toolbar-foot {
    border-top: 1px solid var(--line);
    padding: 12px 22px;
    display: flex; gap: 8px; align-items: center; justify-content: space-between;
    background: var(--surface);
  }
  .btn {
    border: 1px solid var(--line); background: var(--surface);
    padding: 8px 14px; border-radius: 8px;
    font-size: 13px; cursor: pointer; color: var(--ink);
    display: inline-flex; align-items: center; gap: 6px;
    transition: all .12s;
  }
  .btn:hover { background: var(--surface-2); border-color: var(--line-strong); }
  .btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn.primary:hover { background: oklch(from var(--ink) calc(l + 0.06) c h); }

  /* hint banner */
  .hint {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--bg); font-size: 12.5px;
    padding: 8px 14px; border-radius: 999px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
    z-index: 60;
    box-shadow: var(--shadow-md);
  }
  .hint.show { opacity: .92; }

  /* mobile bar */
  .mobile-cats {
    display: none;
    overflow-x: auto; gap: 6px; padding: 0 0 12px; margin: -4px 0 12px;
  }
  @media (max-width: 880px) { .mobile-cats { display: flex; } }

  /* ───── Compare mode (按設計系統延伸) ───── */
  /* 卡片右上角「+ 比較」chip,hover 時顯示 */
  .card { position: relative; }
  .card-compare {
    position: absolute; top: 12px; right: 12px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 11px; font-family: var(--font-zh);
    color: var(--ink-3); cursor: pointer;
    opacity: 0; transition: opacity .14s, background .12s, border-color .12s, color .12s;
    z-index: 2;
  }
  .card:hover .card-compare,
  .card-compare.on { opacity: 1; }
  .card-compare:hover {
    background: var(--brand-soft); border-color: var(--brand-line); color: var(--brand);
  }
  .card-compare.on {
    background: var(--brand); color: var(--bg); border-color: var(--brand);
  }
  .card.compared {
    border-color: var(--brand-line);
    box-shadow: 0 0 0 2px var(--brand-soft);
  }

  /* 浮動比較條 (底部 pill) */
  .compare-bar {
    position: fixed; left: 50%; bottom: 22px;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    box-shadow: var(--shadow-lg);
    z-index: 45;
    max-width: calc(100vw - 24px);
    opacity: 0; pointer-events: none;
    transform: translateX(-50%) translateY(8px);
    transition: opacity .2s, transform .2s;
  }
  .compare-bar.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
  .compare-bar-label {
    font-size: 12px; font-weight: 600; color: var(--brand);
    display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .compare-chips { display: flex; gap: 6px; flex-wrap: wrap; max-width: 50vw; }
  .cmp-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 4px 3px 10px;
    background: var(--brand-soft); border: 1px solid var(--brand-line);
    border-radius: 999px; font-size: 12px; color: var(--brand);
    max-width: 220px;
  }
  .cmp-chip-no {
    font-family: var(--font-mono); font-size: 10.5px;
    background: var(--surface); padding: 1px 5px; border-radius: 6px;
    color: var(--ink-2); border: 1px solid var(--line);
  }
  .cmp-chip-title {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 130px;
  }
  .cmp-chip-x {
    width: 18px; height: 18px; border-radius: 999px;
    border: 0; background: transparent; color: var(--brand);
    cursor: pointer; display: inline-grid; place-items: center;
    font-size: 11px; line-height: 1;
  }
  .cmp-chip-x:hover { background: var(--brand); color: var(--bg); }

  /* Compare modal */
  .cmp-modal {
    position: fixed; inset: 0; z-index: 60;
    display: none;
    align-items: center; justify-content: center;
  }
  .cmp-modal.show { display: flex; }
  .cmp-backdrop {
    position: absolute; inset: 0;
    background: oklch(20% 0.02 265 / .45);
    backdrop-filter: blur(3px);
  }
  .cmp-panel {
    position: relative;
    width: min(96vw, 1500px);
    height: min(92vh, 920px);
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .cmp-head {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .cmp-head h2 {
    margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -.01em;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .cmp-hint {
    font-size: 12px; color: var(--ink-3);
    display: inline-flex; align-items: center; gap: 6px;
    margin-left: auto;
  }
  .cmp-hint::before {
    content: ""; width: 10px; height: 10px; border-radius: 3px;
    background: var(--warn-soft); border: 1px solid var(--warn);
  }
  .cmp-body {
    flex: 1; overflow: hidden;
    display: grid;
  }
  .cmp-cols-2 { grid-template-columns: 1fr 1fr; }
  .cmp-cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .cmp-col {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--line);
    overflow: hidden;
  }
  .cmp-col:last-child { border-right: 0; }
  .cmp-col-head {
    padding: 14px 16px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    display: flex; flex-direction: column; gap: 6px;
  }
  .cmp-col-row {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .cmp-col-no {
    font-family: var(--font-mono); font-size: 11px; color: var(--ink-3);
  }
  .cmp-col-rm {
    width: 26px; height: 26px; border-radius: 7px;
    background: transparent; border: 1px solid transparent;
    color: var(--ink-3); cursor: pointer;
    display: grid; place-items: center;
  }
  .cmp-col-rm:hover { background: var(--surface); border-color: var(--line); color: var(--ink); }
  .cmp-col-title {
    font-size: 15px; font-weight: 600; line-height: 1.4;
    color: var(--ink); margin: 0;
  }
  .cmp-meta {
    background: var(--surface-2); border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    max-height: 200px; overflow-y: auto;
    font-size: 12px;
  }
  .cmp-meta-row {
    display: grid; grid-template-columns: 64px 1fr;
    gap: 10px; padding: 6px 16px;
    border-top: 1px dashed var(--line);
  }
  .cmp-meta-row:first-child { border-top: 0; }
  .cmp-meta-row.diff {
    background: var(--warn-soft); color: oklch(35% 0.06 75);
  }
  @media (prefers-color-scheme: dark) {
    .cmp-meta-row.diff { color: oklch(85% 0.1 75); }
  }
  .cmp-meta-k { color: var(--ink-3); font-weight: 600; }

let NODES_BY_ID = new Map();   // id → original node (含 file_path 等)
let INCOMING_EDGES = new Map();// id → [from1, from2, ...] 反向引用
let SCENARIOS = [];

// 母題 → 簡稱 (sidebar 用)
const PARENTS = ['國內旅費', '國外旅費', '支出憑證與結報'];
// 類別代碼 → art (色點 + label)
const CAT_ART = { A: 'travel', B: 'rate', C: 'fn', D: 'qa' };
const CAT_LABEL = { A: '核心法規', B: '支出標準', C: '解釋函令', D: '問答集' };

// 把節點 title 拆成 no + 主標 ("第一條 訂定目的" → no: "第一條", title: "訂定目的")
function splitTitle(rawTitle, id) {
  if (!rawTitle) return { no: id, title: id };
  // 條 / 點 / 第 N 條 / Q14 / （一）...
  const m = rawTitle.match(/^(第[一二三四五六七八九十百零0-9]+[條點]|Q\d+|附表[\d一二三四五六七八九十]*|（[一二三四五六七八九十]+）)\s*(.*)$/);
  if (m && m[2]) return { no: m[1], title: m[2] };
  return { no: '', title: rawTitle };
}

async function loadAllData() {
  const v = '?v=' + DATA_VERSION;
  const [nodes, edges, scenarios] = await Promise.all([
    fetch('../03_index/nodes.json' + v).then(r => r.json()),
    fetch('../03_index/edges.json' + v).then(r => r.json()),
    fetch('data/scenarios.json' + v).then(r => r.json()).catch(() => ({ scenarios: [] })),
  ]);
  // 建 NODES_BY_ID + 反向 edges
  for (const n of nodes) NODES_BY_ID.set(n.id, n);
  const edgeArr = edges.edges || edges;
  for (const e of edgeArr) {
    if (!INCOMING_EDGES.has(e.to)) INCOMING_EDGES.set(e.to, []);
    INCOMING_EDGES.get(e.to).push(e.from);
  }
  SCENARIOS = scenarios.scenarios || scenarios;
  // map nodes → DATA (隱藏已廢止節點,但保留有 effective_period 的歷史費率表)
  DATA = nodes
    .filter(n => {
      if (n.status === '已廢止' && !n.effective_period) return false;
      return true;
    })
    .map(n => {
      const cat = n.id.split('-')[0];
      const { no, title } = splitTitle(n.title, n.id);
      return {
        id: n.id,
        no, title,
        status: n.status || '現行',
        cat: n.parent || '',
        art: CAT_ART[cat] || 'travel',
        type: n.type,
        catLabel: CAT_LABEL[cat] || '',
        tags: n.tags || [],
        summary: n.summary || '',
        updated: n.reviewed || n.version || '',
        reviewLevel: n.review_level || '',
        sourceUrl: n.source_url || '',
        filePath: n.file_path || '',
        rateTable: n.rate_table || null,
        effectivePeriod: n.effective_period || '',
        supersededBy: n.superseded_by || '',
      };
    });
  return DATA;
}

  type: null,     // 類別代碼:A / B / C / D / null
  tag: null,      // 標籤
  query: '',      // 搜尋字
};
let currentList = [];   // filteredNodes 結果
let currentIdx = -1;    // 抽屜目前指到 currentList 的 index
const grid = document.getElementById("grid");
const hint = document.getElementById("hint");

function statusBadge(s) {
  if (s === "已廢止") return `<span class="badge stop">${s}</span>`;
  if (s === "部分修正") return `<span class="badge warn">${s}</span>`;
  return `<span class="badge ok">${s}</span>`;
}
function dotClass(art) {
  return ({ travel: "dot-travel", fn: "dot-overseas", qa: "dot-food", rate: "dot-rate", overseas: "dot-overseas", food: "dot-food" })[art] || "";
}
function flashHint(msg) {
  hint.textContent = msg;
  hint.classList.add("show");
  setTimeout(()=>hint.classList.remove("show"), 1400);
}

/* 套用 filter → 回傳符合的 DATA 子集 */
function filteredData() {
  const q = filterState.query.trim().toLowerCase();
  return DATA.filter(d => {
    if (filterState.parent && d.cat !== filterState.parent) return false;
    if (filterState.type && d.id.split('-')[0] !== filterState.type) return false;
    if (filterState.tag && !d.tags.includes(filterState.tag)) return false;
    if (q) {
      const hay = (d.id + ' ' + d.title + ' ' + d.summary + ' ' + d.tags.join(' ')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

/* ──────── render cards ──────── */
function renderCards() {
  currentList = filteredData();
  if (currentList.length === 0) {
    grid.innerHTML = `<div class="cmp-empty" style="grid-column:1/-1;padding:60px 24px"><strong>沒有符合條件的條文</strong>清除過濾條件再試試</div>`;
    return;
  }
  grid.innerHTML = currentList.map(d => {
    const inCmp = compareList.includes(d.id);
    const isQa = d.art === 'qa';
    const isRate = d.art === 'rate';
    const summary = d.summary || '<em style="color:var(--ink-3)">(摘要待補)</em>';
    return `
    <article class="card${inCmp ? ' compared' : ''}${isQa ? ' is-qa' : ''}${isRate ? ' is-rate' : ''}" data-id="${d.id}" tabindex="0">
      <button class="card-compare${inCmp ? ' on' : ''}" data-cmp-toggle title="${inCmp ? '已加入比較,點擊移除' : '加入並排比較 (最多 3 張)'}">
        ${inCmp ? '✓ 已加入' : '+ 比較'}
      </button>
      <div class="card-eyebrow">
        <span class="card-no"><span class="card-art ${dotClass(d.art)}"></span>&nbsp;&nbsp;${d.id}</span>
        ${statusBadge(d.status)}
      </div>
      <h3 class="card-title">${d.no ? `<span style="color:var(--ink-3);font-weight:500">${d.no}</span> ` : ''}${d.title}</h3>
      <p class="card-summary">${summary}</p>
      <div class="card-foot">
        <div class="card-tags">${(d.tags || []).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
        <span>${d.updated}</span>
      </div>
    </article>
    `;
  }).join("");
  // 計數
  const $count = document.getElementById('grid-count');
  if ($count) $count.textContent = `${currentList.length} 筆`;
}

/* ──────── drawer (動態 fetch MD) ──────── */
const drawer = document.getElementById("drawer");
const scrim = document.getElementById("scrim");
const MD_BASE = '../';

// 簡易 MD parser:把 H2/H3、表格、列表等基本格式轉 HTML
function renderMarkdown(md) {
  // 移除 front-matter
  if (md.startsWith('---')) {
    const end = md.indexOf('\n---', 3);
    if (end > 0) md = md.slice(end + 4).replace(/^\n+/, '');
  }
  // 簡單語法處理
  let html = md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.+)$/gm, '<h4 style="font-size:13px;font-weight:600;color:var(--ink-2);margin:14px 0 6px">$1</h4>')
    .replace(/^## (.+)$/gm, '<h3 style="margin:0 0 10px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);display:flex;align-items:center;gap:8px"><span style="content:\\\"\\\";display:inline-block;width:14px;height:1px;background:var(--line-strong)"></span>$1</h3>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code style="font-family:var(--font-mono);background:var(--surface-2);padding:1px 5px;border-radius:4px;font-size:12.5px">$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:var(--brand)">$1</a>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^\n*/, '<p>') + '</p>';
  return html;
}

// 從 MD 抽特定 H2 區塊內容
function extractSection(md, heading) {
  const re = new RegExp(`##\\s+${heading}\\s*\\n([\\s\\S]*?)(?=\\n##\\s|$)`);
  const m = md.match(re);
  return m ? m[1].trim() : '';
}

// 渲染 rate_table (B 類專用,簡化版)
function renderRateTableHtml(rt, node) {
  if (!rt) return '';
  const html = ['<div style="background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:18px">'];
  if (node.status === '已廢止' && node.effectivePeriod) {
    html.push(`<div style="background:var(--warn-soft);border:1px solid var(--warn);border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:13px;color:var(--warn)">⏰ <strong>此表已逾期</strong> · 適用 ${node.effectivePeriod}${node.supersededBy ? ` · 現行版本 <strong>${node.supersededBy}</strong>` : ''}</div>`);
  }
  if (rt.caption) html.push(`<div style="font-weight:600;font-size:14px;margin-bottom:4px">${rt.caption}</div>`);
  if (rt.unit || rt.effective) html.push(`<div style="font-size:12px;color:var(--ink-3);margin-bottom:10px">${rt.unit ? '單位: ' + rt.unit : ''}${rt.unit && rt.effective ? ' · ' : ''}${rt.effective ? '生效: ' + rt.effective : ''}</div>`);
  // sections 模式:逐個 render (限制每節最多 8 列避免過長,完整看舊版)
  if (Array.isArray(rt.sections)) {
    for (const sec of rt.sections.slice(0, 4)) {
      if (sec.title) html.push(`<div style="font-weight:600;font-size:13px;margin:12px 0 6px;color:var(--ink-2)">${sec.title}</div>`);
      if (Array.isArray(sec.headers) && Array.isArray(sec.rows)) {
        const rows = sec.rows.slice(0, 8);
        html.push('<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px"><thead><tr>');
        for (const h of sec.headers) html.push(`<th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--line);color:var(--ink-3);font-weight:600">${h}</th>`);
        html.push('</tr></thead><tbody>');
        for (const r of rows) {
          html.push('<tr>');
          for (const c of r) html.push(`<td style="padding:4px 8px;border-bottom:1px solid var(--line)">${typeof c === 'object' ? (c.v || '') : (c || '')}</td>`);
          html.push('</tr>');
        }
        html.push('</tbody></table></div>');
        if (sec.rows.length > 8) html.push(`<div style="font-size:11px;color:var(--ink-3);margin-top:4px">…還有 ${sec.rows.length - 8} 列(請至條文庫舊版查看完整表格)</div>`);
      } else if (sec.summary) {
        html.push(`<div style="padding:8px 12px;background:var(--surface);border-radius:6px;font-size:13px">${sec.summary}</div>`);
      }
    }
    if (rt.sections.length > 4) html.push(`<div style="font-size:11px;color:var(--ink-3);margin-top:8px">…另有 ${rt.sections.length - 4} 個章節</div>`);
  } else if (Array.isArray(rt.headers) && Array.isArray(rt.rows)) {
    // flat 模式
    const rows = rt.rows.slice(0, 12);
    html.push('<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px"><thead><tr>');
    for (const h of rt.headers) html.push(`<th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--line);color:var(--ink-3);font-weight:600">${h}</th>`);
    html.push('</tr></thead><tbody>');
    for (const r of rows) {
      html.push('<tr>');
      for (const c of r) html.push(`<td style="padding:4px 8px;border-bottom:1px solid var(--line)">${typeof c === 'object' ? (c.v || '') : (c || '')}</td>`);
      html.push('</tr>');
    }
    html.push('</tbody></table></div>');
    if (rt.rows.length > 12) html.push(`<div style="font-size:11px;color:var(--ink-3);margin-top:4px">…還有 ${rt.rows.length - 12} 列</div>`);
  }
  html.push('</div>');
  return html.join('');
}

async function openDrawer(idx) {
  const d = currentList[idx];
  if (!d) return;
  currentIdx = idx;
  document.querySelectorAll(".card").forEach(c => c.classList.toggle("active", c.dataset.id === d.id));
  // metadata 行 + 類別膠囊
  const reviewMeta = d.reviewLevel ? ` ${d.reviewLevel}` : '';
  document.getElementById("d-meta").innerHTML = `${d.id} <span class="sep"></span> ${d.updated || '尚未校對'}${reviewMeta} <span class="sep"></span> ${d.cat} · ${d.catLabel}`;
  document.getElementById("d-title").textContent = d.no ? `${d.no} ${d.title}` : d.title;
  document.getElementById("d-tags").innerHTML = (d.tags || []).map(t => `<span class="tag">${t}</span>`).join("");
  // 重置 status badge 元素
  const oldStatus = document.getElementById("d-status");
  if (oldStatus) {
    oldStatus.outerHTML = statusBadge(d.status).replace("<span", "<span id=\"d-status\"");
  }
  // 載入 MD body
  const $body = document.getElementById("d-body");
  $body.innerHTML = '<p style="color:var(--ink-3);text-align:center;padding:30px">載入中…</p>';
  drawer.classList.add("show");
  scrim.classList.add("show");
  drawer.setAttribute("aria-hidden","false");

  try {
    const r = await fetch(MD_BASE + d.filePath);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const md = await r.text();

    let bodyHtml = '';
    // 重點摘要 (D 類通常是 Q&A,用「問題」+「回答」結構)
    if (d.art === 'qa') {
      const question = extractSection(md, '問題');
      const answer = extractSection(md, '回答') || extractSection(md, '答覆');
      if (question) bodyHtml += `<div class="section"><h3>問題</h3><div class="article" style="border-left:3px solid var(--brand);background:var(--brand-soft)">${question.replace(/\n/g, '<br>')}</div></div>`;
      if (answer) bodyHtml += `<div class="section"><h3>回答</h3><div class="article">${answer.replace(/\n/g, '<br>')}</div></div>`;
    }
    // B 類:rate_table 結構化渲染
    if (d.rateTable) {
      bodyHtml += `<div class="section"><h3>結構化費率表</h3>${renderRateTableHtml(d.rateTable, d)}</div>`;
    }
    // 重點摘要 (一般)
    const summary = extractSection(md, '重點摘要');
    if (summary && d.art !== 'qa') {
      bodyHtml += `<div class="section"><h3>重點摘要</h3><div class="article" style="background:var(--brand-soft);border-color:var(--brand-line)">${summary.replace(/\n/g, '<br>')}</div></div>`;
    }
    // 條文全文 / 函釋全文 / 標準全文
    const fullText = extractSection(md, '條文全文') || extractSection(md, '函釋全文') || extractSection(md, '標準全文') || extractSection(md, '函釋內容');
    if (fullText && !d.rateTable) {
      const heading = d.art === 'fn' ? '函釋全文' : (d.art === 'rate' ? '標準全文' : '條文全文');
      bodyHtml += `<div class="section"><h3>${heading}</h3><div class="article">${fullText.replace(/\n/g, '<br>')}</div></div>`;
    }
    // 相關規定 (從 node.related + INCOMING_EDGES)
    const node = NODES_BY_ID.get(d.id);
    const outgoing = (node?.related || []).map(rid => NODES_BY_ID.get(rid)).filter(Boolean);
    const incoming = (INCOMING_EDGES.get(d.id) || []).map(rid => NODES_BY_ID.get(rid)).filter(Boolean);
    if (outgoing.length || incoming.length) {
      bodyHtml += `<div class="section"><h3>相關規定</h3><div class="related">`;
      for (const r of outgoing) {
        const cat = r.id.split('-')[0];
        const kind = cat === 'D' ? 'qa' : 'fn';
        bodyHtml += `<div class="related-item" data-jump="${r.id}">
          <span class="related-kind ${kind}">→ ${CAT_LABEL[cat] || cat}</span>
          <div class="related-text">${r.title}<small>${r.id} · ${r.parent}</small></div>
        </div>`;
      }
      for (const r of incoming.slice(0, 6)) {
        const cat = r.id.split('-')[0];
        const kind = cat === 'D' ? 'qa' : 'fn';
        bodyHtml += `<div class="related-item" data-jump="${r.id}" style="border-left:3px solid var(--ok)">
          <span class="related-kind ${kind}">← ${CAT_LABEL[cat] || cat}</span>
          <div class="related-text">${r.title}<small>${r.id} · ${r.parent}</small></div>
        </div>`;
      }
      bodyHtml += `</div></div>`;
    }
    // 備註
    const note = extractSection(md, '備註');
    if (note && note.trim()) {
      bodyHtml += `<div class="section"><h3>備註</h3><div style="font-size:13px;color:var(--ink-2);padding:8px 12px;background:var(--surface-2);border-radius:6px">${note.replace(/\n/g, '<br>')}</div></div>`;
    }

    if (!bodyHtml) bodyHtml = '<p style="color:var(--ink-3)">(此節點無詳細內容)</p>';
    $body.innerHTML = bodyHtml;
    // 綁 related-item 跳轉
    $body.querySelectorAll('[data-jump]').forEach(el => {
      el.style.cursor = 'pointer';
      el.onclick = () => {
        const target = el.dataset.jump;
        const targetIdx = currentList.findIndex(x => x.id === target);
        if (targetIdx >= 0) {
          openDrawer(targetIdx);
        } else {
          // 不在當前過濾結果內,重置 filter 後再開
          filterState.parent = null;
          filterState.type = null;
          filterState.tag = null;
          filterState.query = '';
          renderCards();
          const newIdx = currentList.findIndex(x => x.id === target);
          if (newIdx >= 0) openDrawer(newIdx);
        }
      };
    });
  } catch (e) {
    $body.innerHTML = `<p style="color:var(--stop)">載入失敗: ${e.message}</p>`;
  }
}

function closeDrawer() {
  drawer.classList.remove("show");
  scrim.classList.remove("show");
  drawer.setAttribute("aria-hidden","true");
  document.querySelectorAll(".card.active").forEach(c => c.classList.remove("active"));
  currentIdx = -1;
}

function move(delta) {
  if (currentIdx < 0) return;
  let n = currentIdx + delta;
  if (n < 0) n = currentList.length - 1;
  if (n >= currentList.length) n = 0;
  openDrawer(n);
  const card = document.querySelector(`.card[data-id="${currentList[n].id}"]`);
  card?.scrollIntoView({ block: "nearest", behavior: "smooth" });
}

grid.addEventListener("click", e => {
  if (e.target.closest("[data-cmp-toggle]")) {
    e.stopPropagation();
    const card = e.target.closest(".card");
    if (card) toggleCompare(card.dataset.id);
    return;
  }
  const card = e.target.closest(".card");
  if (!card) return;
  const idx = currentList.findIndex(d => d.id === card.dataset.id);
  if (idx >= 0) openDrawer(idx);
});
grid.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const card = e.target.closest(".card");
    if (card) {
      const idx = currentList.findIndex(d => d.id === card.dataset.id);
      if (idx >= 0) openDrawer(idx);
    }
  }
});

document.getElementById("btn-close").addEventListener("click", closeDrawer);
scrim.addEventListener("click", closeDrawer);

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && !document.getElementById('cmp-modal').classList.contains('show')) closeDrawer();
  if (drawer.classList.contains("show")) {
    if (e.key === "ArrowDown" || e.key === "ArrowRight") { e.preventDefault(); move(1); }
    if (e.key === "ArrowUp" || e.key === "ArrowLeft") { e.preventDefault(); move(-1); }
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
    e.preventDefault();
    document.getElementById("q").focus();
  }
});

document.getElementById("btn-copy").addEventListener("click", () => {
  if (currentIdx < 0) return;
  const d = currentList[currentIdx];
  navigator.clipboard?.writeText(`${d.id} ${d.title}`);
  flashHint("已複製：" + d.id);
});
document.getElementById("btn-source").addEventListener("click", () => {
  if (currentIdx < 0) return;
  const d = currentList[currentIdx];
  if (d.sourceUrl) window.open(d.sourceUrl, '_blank');
  else flashHint('此節點無原始出處');
});

/* ──────── sidebar / chip / search 動態渲染 ──────── */
function renderSidebar() {
  // 入口計數 (核心法規 / 解釋函令 / 問答集 / 支出標準)
  const byType = { A: 0, B: 0, C: 0, D: 0 };
  for (const d of DATA) {
    const t = d.id.split('-')[0];
    if (byType[t] != null) byType[t]++;
  }
  // 母題計數
  const byParent = {};
  for (const d of DATA) byParent[d.cat] = (byParent[d.cat] || 0) + 1;

  const sideItems = [`
    <div class="nav-group">
      <div class="nav-label">類別</div>
      <div class="nav-item${filterState.type === null ? ' active' : ''}" data-type=""><span>全部</span><span class="nav-count">${DATA.length}</span></div>
      <div class="nav-item${filterState.type === 'A' ? ' active' : ''}" data-type="A"><span>📑 核心法規</span><span class="nav-count">${byType.A}</span></div>
      <div class="nav-item${filterState.type === 'B' ? ' active' : ''}" data-type="B"><span>📊 支出標準</span><span class="nav-count">${byType.B}</span></div>
      <div class="nav-item${filterState.type === 'C' ? ' active' : ''}" data-type="C"><span>📜 解釋函令</span><span class="nav-count">${byType.C}</span></div>
      <div class="nav-item${filterState.type === 'D' ? ' active' : ''}" data-type="D"><span>💬 問答集</span><span class="nav-count">${byType.D}</span></div>
    </div>
    <div class="nav-group">
      <div class="nav-label">母題</div>
      <div class="nav-item${filterState.parent === null ? ' active' : ''}" data-parent=""><span>全部</span><span class="nav-count">${DATA.length}</span></div>
      ${PARENTS.map(p => `<div class="nav-item${filterState.parent === p ? ' active' : ''}" data-parent="${p}"><span>${p}</span><span class="nav-count">${byParent[p] || 0}</span></div>`).join('')}
    </div>
  `];
  // 替換 sidebar 內 nav-group
  const side = document.querySelector('.side');
  // 保留 brand,只替換之後的 nav-group
  const brand = side.querySelector('.brand');
  side.innerHTML = '';
  side.appendChild(brand);
  // 更新節點數副標
  const brandText = brand.querySelector('.brand-text small');
  if (brandText) brandText.textContent = `${DATA.length} 節點 · v2 預覽`;
  side.insertAdjacentHTML('beforeend', sideItems.join(''));

  // 綁 click
  side.querySelectorAll('.nav-item').forEach(it => {
    it.onclick = () => {
      if (it.dataset.type !== undefined) {
        filterState.type = it.dataset.type || null;
      }
      if (it.dataset.parent !== undefined) {
        filterState.parent = it.dataset.parent || null;
      }
      renderSidebar();
      renderChips();
      renderCards();
    };
  });
}

function renderChips() {
  // 由目前過濾後資料計算 top tags
  const tagCount = new Map();
  const filtered = filteredData();
  for (const d of filtered) {
    for (const t of (d.tags || [])) tagCount.set(t, (tagCount.get(t) || 0) + 1);
  }
  const topTags = [...tagCount.entries()].sort((a, b) => b[1] - a[1]).slice(0, 8);
  const bar = document.querySelector('.filterbar');
  if (!bar) return;
  bar.innerHTML = `
    <button class="chip${!filterState.tag ? ' on' : ''}" data-tag="">全部 <span class="chip-count">${filtered.length}</span></button>
    ${topTags.map(([t, c]) => `<button class="chip${filterState.tag === t ? ' on' : ''}" data-tag="${t}">${t} <span class="chip-count">${c}</span></button>`).join('')}
  `;
  bar.querySelectorAll('.chip').forEach(c => {
    c.onclick = () => {
      filterState.tag = c.dataset.tag || null;
      renderChips();
      renderCards();
    };
  });
}

// 搜尋 input
document.getElementById('q').addEventListener('input', (ev) => {
  filterState.query = ev.target.value;
  renderChips();
  renderCards();
});

/* ──────── init ──────── */
async function init() {
  try {
    await loadAllData();
    renderSidebar();
    renderChips();
    renderCards();
    // 預設開第一張卡示範
    if (currentList.length > 0) setTimeout(() => openDrawer(0), 200);
  } catch (e) {
    grid.innerHTML = `<div style="color:var(--stop);padding:40px">資料載入失敗: ${e.message}</div>`;
    console.error(e);
  }
}
init();

/* ──────── compare mode (compareList declared at top of script) ──────── */
function toggleCompare(id) {
  const i = compareList.indexOf(id);
  if (i >= 0) {
    compareList.splice(i, 1);
    flashHint("已從比較中移除");
  } else {
    if (compareList.length >= 3) {
      flashHint("比較最多 3 張卡");
      return;
    }
    compareList.push(id);
    flashHint(`已加入比較 (${compareList.length}/3)`);
  }
  renderCards();        // 同步卡片狀態 (chip on/off + .compared outline)
  renderCompareBar();
  updateDrawerCmpBtn();
}
function clearCompare() {
  compareList = [];
  renderCards();
  renderCompareBar();
  updateDrawerCmpBtn();
}
function renderCompareBar() {
  const bar = document.getElementById("compare-bar");
  const chips = document.getElementById("compare-chips");
  const showBtn = document.getElementById("btn-show-compare");
  if (compareList.length === 0) {
    bar.classList.remove("show");
    return;
  }
  bar.classList.add("show");
  chips.innerHTML = compareList.map(id => {
    const d = DATA.find(x => x.id === id);
    if (!d) return "";
    return `<span class="cmp-chip">
      <span class="cmp-chip-no">${d.id}</span>
      <span class="cmp-chip-title">${d.no} ${d.title}</span>
      <button class="cmp-chip-x" data-cmp-rm="${id}" title="移除">✕</button>
    </span>`;
  }).join("");
  chips.querySelectorAll("[data-cmp-rm]").forEach(b => {
    b.onclick = (e) => { e.stopPropagation(); toggleCompare(b.dataset.cmpRm); };
  });
  showBtn.disabled = compareList.length < 2;
  showBtn.textContent = compareList.length < 2
    ? `並排比較 (還需 ${2 - compareList.length} 張)`
    : `並排比較 (${compareList.length} 張)`;
}
function updateDrawerCmpBtn() {
  const btn = document.getElementById("btn-add-compare");
  if (!btn || currentIdx < 0) {
    if (btn) { btn.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>加入比較`; }
    return;
  }
  const id = currentList[currentIdx]?.id;
  if (!id) return;
  const inCmp = compareList.includes(id);
  btn.innerHTML = inCmp
    ? `<svg class="icon" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>已加入比較`
    : `<svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>加入比較`;
  btn.classList.toggle("primary", inCmp);
}

/* hook drawer open to update btn — async safe */
const _origOpenDrawer = openDrawer;
window.openDrawer = async function(idx) { await _origOpenDrawer(idx); updateDrawerCmpBtn(); };

document.getElementById("btn-add-compare").addEventListener("click", () => {
  if (currentIdx < 0) return;
  toggleCompare(currentList[currentIdx].id);
});
document.getElementById("btn-clear-compare").addEventListener("click", clearCompare);

/* compare modal */
const cmpModal = document.getElementById("cmp-modal");
const cmpBody = document.getElementById("cmp-body");

const META_FIELDS = [
  ["條號",     n => n.id],
  ["條名",     n => `${n.no} ${n.title}`],
  ["分類",     n => n.cat],
  ["狀態",     n => n.status],
  ["更新日",   n => n.updated],
  ["標籤",     n => (n.tags || []).join("、")],
];

async function openCompareModal() {
  if (compareList.length < 2) return;
  const nodes = compareList.map(id => DATA.find(x => x.id === id)).filter(Boolean);
  const colsClass = nodes.length === 3 ? "cmp-cols-3" : "cmp-cols-2";

  // 偵測哪些 metadata 欄位有差異
  const isDiff = META_FIELDS.map(([_, fn]) => new Set(nodes.map(fn)).size > 1);

  cmpBody.className = "cmp-body " + colsClass;
  cmpBody.innerHTML = nodes.map((d, i) => `
    <div class="cmp-col">
      <div class="cmp-col-head">
        <div class="cmp-col-row">
          <span class="cmp-col-no">${d.id}</span>
          <button class="cmp-col-rm" data-cmp-rm-modal="${d.id}" title="從比較中移除">
            <svg class="icon" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6l-12 12"/></svg>
          </button>
        </div>
        <h3 class="cmp-col-title">${d.no ? d.no + ' ' : ''}${d.title}</h3>
        <div>${statusBadge(d.status)}</div>
      </div>
      <div class="cmp-meta">
        ${META_FIELDS.map(([k, fn], idx) => `
          <div class="cmp-meta-row${isDiff[idx] ? ' diff' : ''}">
            <span class="cmp-meta-k">${k}</span>
            <span class="cmp-meta-v">${(fn(d) || "—")}</span>
          </div>
        `).join("")}
      </div>
      <div class="cmp-col-body" data-load="${d.id}">
        <p style="color:var(--ink-3);font-size:12px">載入中…</p>
      </div>
      <div class="cmp-col-foot">
        <button class="btn" data-cmp-open="${d.id}">
          <svg class="icon" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          開啟此卡完整抽屜
        </button>
      </div>
    </div>
  `).join("");

  // 載入各 column 的內容 (摘要 + 條文 + rate_table)
  for (const d of nodes) {
    const $col = cmpBody.querySelector(`[data-load="${d.id}"]`);
    if (!$col) continue;
    try {
      const r = await fetch(MD_BASE + d.filePath);
      const md = await r.text();
      let html = '';
      const summary = extractSection(md, '重點摘要');
      if (summary) html += `<div class="section"><h3>重點摘要</h3><div class="article" style="background:var(--brand-soft);border-color:var(--brand-line)">${summary.replace(/\n/g, '<br>')}</div></div>`;
      if (d.rateTable) {
        html += `<div class="section"><h3>結構化費率表</h3>${renderRateTableHtml(d.rateTable, d)}</div>`;
      } else {
        const full = extractSection(md, '條文全文') || extractSection(md, '函釋全文') || extractSection(md, '標準全文') || extractSection(md, '函釋內容');
        if (full) {
          const heading = d.art === 'fn' ? '函釋全文' : (d.art === 'qa' ? '回答' : '條文全文');
          html += `<div class="section"><h3>${heading}</h3><div class="article">${full.replace(/\n/g, '<br>')}</div></div>`;
        }
      }
      if (!html) html = '<p style="color:var(--ink-3)">(無內容)</p>';
      $col.innerHTML = html;
    } catch (e) {
      $col.innerHTML = `<p style="color:var(--stop);font-size:12px">載入失敗: ${e.message}</p>`;
    }
  }

  // 綁 column 內的「移除」與「開啟抽屜」
  cmpBody.querySelectorAll("[data-cmp-rm-modal]").forEach(b => {
    b.onclick = () => {
      toggleCompare(b.dataset.cmpRmModal);
      if (compareList.length < 2) closeCompareModal();
      else openCompareModal();
    };
  });
  cmpBody.querySelectorAll("[data-cmp-open]").forEach(b => {
    b.onclick = () => {
      closeCompareModal();
      const idx = currentList.findIndex(x => x.id === b.dataset.cmpOpen);
      if (idx >= 0) openDrawer(idx);
      else flashHint('該卡片不在當前過濾結果內,請先清除過濾');
    };
  });

  cmpModal.classList.add("show");
}
function closeCompareModal() {
  cmpModal.classList.remove("show");
}
document.getElementById("btn-show-compare").addEventListener("click", openCompareModal);
document.querySelectorAll("[data-cmp-close]").forEach(el => el.addEventListener("click", closeCompareModal));

// ESC 優先關 compare modal
const _origKeyHandler = document.onkeydown;
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && cmpModal.classList.contains("show")) {
    e.stopPropagation();
    closeCompareModal();
  }
}, true);  // capture phase 搶在 drawer 之前
</script>
</body>
</html>
